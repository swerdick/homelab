---
# Routes https://jellyfin.vingilot.internal/* to the Jellyfin Service.
# Public-by-LAN-policy: no auth middleware (Jellyfin has its own login).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  parentRefs:
    - name: vingilot
      namespace: traefik
      sectionName: jellyfin-https
  hostnames:
    - jellyfin.vingilot.internal
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: jellyfin
          port: 8096
