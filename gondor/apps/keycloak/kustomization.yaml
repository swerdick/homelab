apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Inject the namespace into all namespaced resources — notably the vendored
# operator manifests, whose Deployment/SA/Role/RoleBindings/Service don't carry
# one (CRDs + ClusterRoles stay cluster-scoped; CRB subjects get rewritten here).
namespace: keycloak
resources:
  - namespace.yaml
  # Keycloak Operator — vendored from keycloak-k8s-resources @ 26.6.2 (operator/).
  # Pinning the operator pins the Keycloak server version it deploys.
  - operator/keycloaks-crd.yaml
  - operator/keycloakrealmimports-crd.yaml
  - operator/operator.yaml
  - postgres-cluster.yaml
  - postgres-podmonitor.yaml
  - keycloak.yaml
  - keycloak-route.yaml
