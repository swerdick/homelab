# Routes https://keycloak.vingilot.internal/* to the Keycloak Operator's Service
# (keycloak-service:8080 — the http port, since spec.http.httpEnabled is on). No
# basic-auth middleware — Keycloak IS the auth system. TLS terminates at the
# Gateway; Keycloak trusts X-Forwarded-* (proxy.headers: xforwarded) to emit
# https URLs back.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: vingilot
      namespace: traefik
      sectionName: keycloak-https
  hostnames:
    - keycloak.vingilot.internal
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: keycloak-service
          port: 8080
