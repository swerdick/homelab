---
# Routes https://grafana.vingilot.internal/* to the kube-prometheus-stack
# Grafana Service. Binds specifically to the `grafana-https` listener on the
# vingilot Gateway; HTTP requests are not served (no redirect for now).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: vingilot
      namespace: traefik
      sectionName: grafana-https
  hostnames:
    - grafana.vingilot.internal
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
