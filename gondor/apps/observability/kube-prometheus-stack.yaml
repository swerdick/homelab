---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "*"  # see note below
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # Sized conservatively for the 10GB gondor VM
    prometheus:
      prometheusSpec:
        # Accept Prometheus remote_write pushes from external collectors
        # (Alloy on the bare hosts/LXCs/VMs) at /api/v1/write.
        enableRemoteWriteReceiver: true
        retention: 14d
        retentionSize: "8GB"
        # Mirror a curated subset of k8s metrics to Grafana Cloud's free
        # tier so the flux + workload dashboards keep working when in-cluster
        # observability is unreachable. Allowlist sized at ~2,870 series
        # against the 10k cap; combined with the host-alloy dual-export it
        # leaves ~6,500 series of headroom. Creds in grafana-cloud-creds
        # Secret (SOPS-encrypted, same access-policy token as host alloys).
        remoteWrite:
          - name: grafana-cloud
            url: https://prometheus-prod-56-prod-us-east-2.grafana.net/api/prom/push
            basicAuth:
              username:
                name: grafana-cloud-creds
                key: metrics_username
              password:
                name: grafana-cloud-creds
                key: token
            writeRelabelConfigs:
              # Add cluster=homelab on the way out so cross-source queries
              # like `{cluster="homelab"}` match both host-alloy series
              # (which set this via alloy's external_labels) and these
              # k8s-side series. Cloud-only — in-cluster TSDB is unaffected.
              - targetLabel: cluster
                replacement: homelab
                action: replace
              - sourceLabels: [__name__]
                regex: "up|gotk_.*|controller_runtime_active_workers|controller_runtime_reconcile_errors_total|workqueue_depth|kube_pod_status_(phase|ready)|kube_pod_owner|kube_pod_container_status_restarts_total|kube_pod_container_status_last_terminated_(exitcode|reason)|kube_pod_container_resource_(limits|requests)|kube_deployment_(spec|status)_replicas.*|container_cpu_usage_seconds_total|container_memory_working_set_bytes|node_namespace_pod_container:.*"
                action: keep
              # Drop the per-pod aggregate series cAdvisor emits with
              # container="" — duplicates per-container data, mostly noise.
              - sourceLabels: [__name__, container]
                regex: "container_(cpu_usage_seconds_total|memory_working_set_bytes);"
                action: drop
            queueConfig:
              maxSamplesPerSend: 1000
              maxShards: 4
        # Discover PodMonitor/ServiceMonitor/Probe/PrometheusRule resources
        # cluster-wide, not just those carrying the chart's helm-release
        # label. Without these flags Prometheus only sees in-chart monitors;
        # CNPG's auto-generated PodMonitor and the Flux PodMonitor would be
        # silently ignored. Single-Prometheus homelab — broad discovery is
        # what we want.
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        resources:
          requests:
            memory: 1Gi
          limits:
            memory: 2Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi

    grafana:
      # Admin credentials seeded from a SOPS-encrypted Secret. Note: the
      # Secret is read by Grafana only on initial admin-user creation; once
      # the user exists in the DB, the env var is ignored. See the comment
      # block in grafana-admin.yaml for the live-password rotation procedure.
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: true
        storageClassName: local-path
        size: 2Gi
      # Provision Loki as an additional datasource. In-cluster URL — no
      # auth needed (basic auth is enforced at the traefik edge for
      # external clients only).
      additionalDataSources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki.monitoring.svc.cluster.local:3100
          isDefault: false
          jsonData:
            timeout: 60
            maxLines: 1000

      # OIDC SSO via Keycloak (vingilot realm). Client + secret are TF-managed
      # in `terraform/keycloak/keycloak.tf`; the client secret is SOPS'd in
      # grafana-oauth.yaml and injected via envValueFrom below. `tls_client_ca`
      # scopes tirion-root trust to the OAuth provider only — Grafana's system
      # trust store stays intact for plugins/external HTTPS.
      grafana.ini:
        server:
          root_url: https://grafana.vingilot.internal/
        auth.generic_oauth:
          enabled: true
          name: Keycloak
          allow_sign_up: true
          client_id: grafana
          scopes: openid email profile
          auth_url: https://keycloak.vingilot.internal/realms/vingilot/protocol/openid-connect/auth
          token_url: https://keycloak.vingilot.internal/realms/vingilot/protocol/openid-connect/token
          api_url: https://keycloak.vingilot.internal/realms/vingilot/protocol/openid-connect/userinfo
          tls_client_ca: /etc/ssl/tirion/ca.crt
          login_attribute_path: preferred_username
          email_attribute_path: email
          use_refresh_token: true

      # OAuth client secret from a SOPS-encrypted Secret (grafana-oauth.yaml).
      envValueFrom:
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
          secretKeyRef:
            name: grafana-oauth
            key: client_secret

      # Per-pod tirion root CA mount — Go's TLS doesn't inherit the host trust
      # store, so every SSO-wired pod needs its own CA. See the
      # project_in_cluster_internal_ca_trust memory for the language-specific
      # env-var pattern (Grafana uses auth.generic_oauth.tls_client_ca above
      # rather than the global SSL_CERT_FILE, so this trust is OAuth-scoped).
      extraConfigmapMounts:
        - name: tirion-ca
          mountPath: /etc/ssl/tirion
          configMap: grafana-tirion-ca
          readOnly: true

    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi

    # Teach kube-state-metrics how to read Flux CRDs and emit
    # `gotk_resource_info{kind, name, exported_namespace, ready, suspended,
    # revision, ...}` — the metric Flux's monitoring docs assume but don't
    # actually emit themselves. Spec is the upstream-maintained one from
    # fluxcd/flux2-monitoring-example, copied verbatim:
    # https://github.com/fluxcd/flux2-monitoring-example/blob/main/monitoring/controllers/kube-prometheus-stack/kube-state-metrics-config.yaml
    # Refresh from upstream when adding new Flux CRD kinds or when Flux
    # changes its CRD .status.conditions schema.
    #
    # Deliberate divergence: the upstream example sets
    # `--custom-resource-state-only=true` so KSM emits *only* gotk_* metrics
    # (they run a dedicated KSM for Flux). We're not — we share one KSM with
    # the kube-prometheus-stack defaults, so dropping that flag keeps
    # `kube_pod_*`, `kube_deployment_*`, etc. flowing alongside the new
    # gotk_* series. Single KSM, no breakage of kubernetes-mixin dashboards.
    kube-state-metrics:
      rbac:
        extraRules:
          - apiGroups:
              - source.toolkit.fluxcd.io
              - kustomize.toolkit.fluxcd.io
              - helm.toolkit.fluxcd.io
              - notification.toolkit.fluxcd.io
              - image.toolkit.fluxcd.io
            resources:
              - gitrepositories
              - buckets
              - helmrepositories
              - helmcharts
              - ocirepositories
              - kustomizations
              - helmreleases
              - alerts
              - providers
              - receivers
              - imagerepositories
              - imagepolicies
              - imageupdateautomations
            verbs: ["list", "watch"]
      customResourceState:
        enabled: true
        config:
          spec:
            resources:
              - groupVersionKind:
                  group: kustomize.toolkit.fluxcd.io
                  version: v1
                  kind: Kustomization
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux Kustomization resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, lastAppliedRevision]
                      source_name: [spec, sourceRef, name]
              - groupVersionKind:
                  group: helm.toolkit.fluxcd.io
                  version: v2
                  kind: HelmRelease
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux HelmRelease resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, history, "0", chartVersion]
                      chart_name: [status, history, "0", chartName]
                      chart_app_version: [status, history, "0", appVersion]
                      chart_ref_name: [spec, chartRef, name]
                      chart_source_name: [spec, chart, spec, sourceRef, name]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: GitRepository
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux GitRepository resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      url: [spec, url]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: Bucket
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux Bucket resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      endpoint: [spec, endpoint]
                      bucket_name: [spec, bucketName]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: HelmRepository
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux HelmRepository resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      url: [spec, url]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: HelmChart
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux HelmChart resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      chart_name: [spec, chart]
                      chart_version: [spec, version]
              - groupVersionKind:
                  group: source.toolkit.fluxcd.io
                  version: v1
                  kind: OCIRepository
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux OCIRepository resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      revision: [status, artifact, revision]
                      url: [spec, url]
              - groupVersionKind:
                  group: notification.toolkit.fluxcd.io
                  version: v1beta3
                  kind: Alert
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux Alert resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      suspended: [spec, suspend]
              - groupVersionKind:
                  group: notification.toolkit.fluxcd.io
                  version: v1beta3
                  kind: Provider
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux Provider resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      suspended: [spec, suspend]
              - groupVersionKind:
                  group: notification.toolkit.fluxcd.io
                  version: v1
                  kind: Receiver
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux Receiver resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      webhook_path: [status, webhookPath]
              - groupVersionKind:
                  group: image.toolkit.fluxcd.io
                  version: v1
                  kind: ImageRepository
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux ImageRepository resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      image: [spec, image]
              - groupVersionKind:
                  group: image.toolkit.fluxcd.io
                  version: v1
                  kind: ImagePolicy
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux ImagePolicy resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      source_name: [spec, imageRepositoryRef, name]
              - groupVersionKind:
                  group: image.toolkit.fluxcd.io
                  version: v1
                  kind: ImageUpdateAutomation
                metricNamePrefix: gotk
                metrics:
                  - name: "resource_info"
                    help: "The current state of a Flux ImageUpdateAutomation resource."
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          name: [metadata, name]
                    labelsFromPath:
                      exported_namespace: [metadata, namespace]
                      ready: [status, conditions, "[type=Ready]", status]
                      suspended: [spec, suspend]
                      source_name: [spec, sourceRef, name]