---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana-community
  namespace: flux-system
spec:
  interval: 24h
  # The Loki chart was migrated from grafana/helm-charts to the
  # grafana-community organization in 2025. Old URL no longer publishes
  # current chart versions.
  url: https://grafana-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 30m
  releaseName: loki
  chart:
    spec:
      chart: loki
      version: ">=6.0.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # "Monolithic" is the current chart's name for what was previously
    # called "SingleBinary" — all Loki components in one pod, sized for
    # small fleets like this homelab. The `singleBinary` values key is
    # what configures the resulting pod (the rename only affected
    # deploymentMode's value, not the values-section name).
    deploymentMode: Monolithic

    loki:
      # Single-tenant. Basic auth is enforced at the traefik middleware
      # (see loki-route.yaml), not at Loki's HTTP API.
      auth_enabled: false

      commonConfig:
        replication_factor: 1

      # File-based chunk + index storage on the NFS-backed PVC.
      # Default in this chart is `s3`, so we MUST override.
      storage:
        type: filesystem

      # Schema config defaults to {} in the chart — must be set explicitly
      # or Loki refuses to start. tsdb + v13 is the current standard.
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      limits_config:
        # 14-day retention. Bump if you decide journald deserves longer
        # history; Loki self-prunes old chunks via the compactor.
        retention_period: 336h
        # Required for some structured-metadata features in recent Loki.
        allow_structured_metadata: true

      compactor:
        retention_enabled: true
        retention_delete_delay: 2h
        retention_delete_worker_count: 50

      # Pattern ingester (newer Loki feature) is for log-pattern detection;
      # not needed for journald shipping. Disabling keeps memory down.
      pattern_ingester:
        enabled: false

      # We won't define alerts inside Loki — that's Prometheus + Alertmanager
      # territory. Disable the ruler API to avoid confusion.
      ruler:
        enable_api: false

    # Configures the Monolithic mode pod (the chart key kept its old name).
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: nfs-scratch
        size: 10Gi
      resources:
        requests:
          cpu: 50m
          memory: 384Mi
        limits:
          memory: 768Mi

    # Disable distributed-mode component pods — Monolithic mode doesn't
    # use these, but the chart still spins up the relevant Deployments
    # at default replica count unless we set them to 0.
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    # We use traefik (via HTTPRoute + Middleware in loki-route.yaml) for
    # ingress + basic auth, not the chart's bundled nginx gateway.
    gateway:
      enabled: false

    # Disable the chart's helm-test pod (cosmetic — saves a few resources).
    test:
      enabled: false

    # Disable the loki-canary log-generator (would emit synthetic logs to
    # validate the pipeline; we don't need it for a homelab).
    lokiCanary:
      enabled: false
