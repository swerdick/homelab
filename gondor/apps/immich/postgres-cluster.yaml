---
# CNPG-managed Postgres cluster for Immich.
#
# Image: tensorchord/cloudnative-vectorchord — a CNPG-compatible Postgres
# image with the vchord (VectorChord) extension pre-installed. Tag pinned
# to 16.9-0.4.3 to match the vchord version Immich themselves test against
# (immich-app's own non-CNPG image is `14-vectorchord0.4.3-pgvectors0.2.0`,
# so 0.4.3 is the proven-good vchord version for current Immich).
#
# CNPG auto-generates an `immich-postgresql-app` Secret holding connection
# details — Immich's HelmRelease wires DB_URL from the `uri` key of that
# Secret (see immich.yaml).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-postgresql
  namespace: immich
spec:
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16.9-0.4.3

  # vchord requires its shared library preloaded for the CREATE EXTENSION
  # to succeed. Without this, postgres comes up but the bootstrap SQL fails.
  postgresql:
    shared_preload_libraries:
      - vchord.so

  # Tell the operator to create a PodMonitor against the instance metrics
  # endpoint (:9187) so kube-prometheus-stack scrapes it and the CNPG Grafana
  # dashboard populates. Opt-in per cluster by design — CNPG won't assume a
  # Prometheus Operator is installed. (2026-05-27: the dashboard was empty
  # precisely because no cluster had this set; the operator's own
  # cnpg-system/cloudnative-pg PodMonitor only covers the controller.)
  monitoring:
    enablePodMonitor: true

  storage:
    size: 20Gi
    storageClass: nfs-scratch

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      # 1 GiB lets vchord index ops + Immich's connection pool breathe. The
      # initial 512Mi was too tight — postgres came up cleanly but got
      # OOMKilled (exit 137) once Immich started running migrations and
      # vchord indexing. CNPG default if unset is unlimited; capping at
      # 1 GiB keeps gondor's total committed memory predictable.
      memory: 1Gi

  bootstrap:
    initdb:
      database: immich
      owner: immich
      dataChecksums: true
      # Run once against the freshly-created `immich` database. Granting
      # SUPERUSER is the simplest path per the Immich docs — it lets
      # Immich's startup migrations create/drop extensions as needed.
      # earthdistance depends on cube; CASCADE on vchord pulls in pgvector.
      postInitApplicationSQL:
        - ALTER USER immich WITH SUPERUSER
        - CREATE EXTENSION IF NOT EXISTS vchord CASCADE
        - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE
