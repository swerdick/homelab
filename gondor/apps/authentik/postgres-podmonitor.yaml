# Hand-managed PodMonitor for Authentik's CNPG instance metrics (:9187).
# CNPG deprecated the operator-managed spec.monitoring.enablePodMonitor flag, so
# we own this directly (matches immich/harbor/auto-water). Mirrors the operator's
# spec; `cnpg.io/podRole: instance` is required — its omission is the
# metric-label-loss bug in CNPG issue #8978. Scraped by kube-prometheus-stack
# (match-all podMonitorSelector) → feeds the CNPG Grafana dashboard.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: authentik-postgresql-metrics
  namespace: authentik
spec:
  namespaceSelector: {}
  selector:
    matchLabels:
      cnpg.io/cluster: authentik-postgresql
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
