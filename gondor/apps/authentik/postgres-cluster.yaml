---
# CNPG-managed Postgres for Authentik (users, applications, flows, policies,
# tokens, events). No imageName → CNPG operator's default image (PG18 on 1.29),
# matching the Harbor/auto-water clusters; Authentik needs no special build.
#
# postInitApplicationSQL pre-creates pg_trgm (superuser-run against the app DB),
# which Authentik's migrations require for trigram/GIN indexes — pre-creating it
# avoids any owner-permission edge case during the first migrate.
#
# Auto-generates `authentik-postgresql-app`; the HelmRelease injects its
# `password` key as AUTHENTIK_POSTGRESQL__PASSWORD via global.env.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-postgresql
  namespace: authentik
spec:
  instances: 1

  storage:
    size: 8Gi
    storageClass: nfs-scratch

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      dataChecksums: true
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS pg_trgm
