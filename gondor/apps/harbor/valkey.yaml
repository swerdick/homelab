---
# Per-app Valkey for Harbor's Redis needs: jobservice task/queue state, core
# cache, and registry cache. Ephemeral by design — no persistence; on restart
# Harbor re-queues/rebuilds (cache + broker, not a system of record, per the
# data-layer standard). Deliberately NOT an operator and NOT shared: one small
# Valkey per app keeps the blast radius contained.
#
# noeviction (Valkey's default — we set no maxmemory-policy) is intentional:
# jobservice stores live task state here, so an LRU policy could silently drop
# queued work. We size memory with headroom instead and let it restart loudly
# if ever exceeded.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: harbor-valkey
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor-valkey
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: harbor-valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: harbor-valkey
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: valkey/valkey:9.1-alpine
          # --save "" + --appendonly no disables both RDB and AOF persistence.
          args:
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - name: valkey
              containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            tcpSocket:
              port: valkey
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            # readOnlyRootFilesystem: true — Valkey's WORKDIR (/data) and /tmp
            # must be writable, so back them with emptyDirs.
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: harbor-valkey
  namespace: harbor
  labels:
    app.kubernetes.io/name: harbor-valkey
spec:
  selector:
    app.kubernetes.io/name: harbor-valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
