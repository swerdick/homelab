# Tirion root CA for Harbor's outbound TLS (mainly: OIDC discovery + token
# exchange against keycloak.vingilot.internal). Mounted into Harbor's
# core / jobservice / registry / trivy trust stores by the chart's top-level
# `caBundleSecretName` (see harbor.yaml) — the chart writes this Secret's
# `ca.crt` key into /harbor_cust_cert/ca.crt inside each pod.
#
# Public cert — INTENTIONALLY NOT SOPS-encrypted. The harbor-helm chart only
# accepts a Kubernetes Secret here (not a ConfigMap, unlike immich/grafana's
# tirion-ca-configmap.yaml), but the content is a public root cert; encrypting
# it would add decrypt machinery for zero security gain. Same PEM as
# gondor/apps/immich/tirion-ca-configmap.yaml + the observability one. Refresh
# all three on CA rotation.
apiVersion: v1
kind: Secret
metadata:
  name: harbor-tirion-ca
  namespace: harbor
type: Opaque
stringData:
