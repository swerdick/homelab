## CT 117 %E2%80%94 anduril (gaming LXC)
#
#Privileged LXC that boots straight into **Steam Big Picture** on the living-room
#TV, sharing the host's **AMD RX 9070 XT** via `amdgpu` (no GPU passthrough).
#Replaced the GTX-970 passthrough VM (deleted 2026-06); same ID + name.
#
#- **Shell%3A** `kwin_wayland` (Wayland) hosting `steam -gamepadui`, autostarted by
#  `anduril-session.service`. gamescope can't get a seat in a VT-less LXC; KWin
#  tolerates it. The Plasma *desktop pointer* is unusable (libinput needs a VT),
#  so the controller drives Steam directly (`/dev/input` + `/dev/hidraw`).
#- **GPU is shared, not claimed** %E2%80%94 a future k3s AI-worker LXC can bind the same
#  `renderD129` + `/dev/kfd`. See [[project-anduril-lxc-spike]].
#- **Games%3A** `/games` = bind-mount of ZFS dataset `scratch/anduril-games` (WD
#  Blue HDD, 600G quota, no backup %E2%80%94 re-downloadable).
#- **Audio%3A** `/dev/snd` passthrough -> PipeWire -> AMD HDMI sink (the TV).
#- **Admin%3A** SSH; xrdp+XFCE for a mouse/keyboard desktop (Prism, emulators).
#
### Config split (bpg can't express these -> ansible-managed on the host)
#Raw `lxc.*` device passthrough (`/dev/dri/card0`+`renderD129`, `/dev/kfd`,
#`/dev/input`, `/dev/uinput`, `/dev/hidraw*`, `/dev/snd`), `lxc.mount.auto%3A sys%3Arw`,
#and the `features` flags all live in `/etc/pve/lxc/117.conf` via
#`setup-anduril-lxc.yaml` (privileged-CT features/binds are root@pam-only, so the
#TF token can't set them %E2%80%94 this CT was `pct create`d + imported, like the others).
#Host `amdgpu`/fbcon/`hid-steam` prereqs%3A `setup-amdgpu-host.yaml`. In-guest
#session%3A `setup-anduril-session.yaml`.
arch: amd64
cores: 8
cpuunits: 50
features: nesting=1,keyctl=1
hostname: anduril
memory: 12288
mp0: /scratch/anduril-games,mp=/games,backup=0
mp1: /bulk/games,mp=/bulk/games,shared=1,backup=0
net0: name=eth0,bridge=vmbr0,hwaddr=BC:24:11:2B:A8:D6,ip=dhcp,type=veth
onboot: 1
ostype: ubuntu
rootfs: local-zfs:subvol-117-disk-0,size=64G
searchdomain: vingilot.internal
startup: order=10
swap: 2048
lxc.cgroup2.devices.allow: c 226:* rwm
lxc.cgroup2.devices.allow: c 235:* rwm
lxc.cgroup2.devices.allow: c 13:* rwm
lxc.cgroup2.devices.allow: c 10:223 rwm
lxc.cgroup2.devices.allow: c 240:* rwm
lxc.cgroup2.devices.allow: c 116:* rwm
lxc.mount.entry: /dev/dri/card0 dev/dri/card0 none bind,optional,create=file
lxc.mount.entry: /dev/dri/renderD129 dev/dri/renderD129 none bind,optional,create=file
lxc.mount.entry: /dev/kfd dev/kfd none bind,optional,create=file
lxc.mount.entry: /dev/input dev/input none bind,optional,create=dir
lxc.mount.entry: /dev/uinput dev/uinput none bind,optional,create=file
lxc.mount.entry: /dev/snd dev/snd none bind,optional,create=dir
lxc.mount.entry: /dev/hidraw0 dev/hidraw0 none bind,optional,create=file
lxc.mount.entry: /dev/hidraw1 dev/hidraw1 none bind,optional,create=file
lxc.mount.entry: /dev/hidraw2 dev/hidraw2 none bind,optional,create=file
lxc.mount.entry: /dev/hidraw3 dev/hidraw3 none bind,optional,create=file
lxc.mount.entry: /dev/hidraw4 dev/hidraw4 none bind,optional,create=file
lxc.mount.entry: /dev/hidraw5 dev/hidraw5 none bind,optional,create=file
lxc.mount.entry: /dev/hidraw6 dev/hidraw6 none bind,optional,create=file
lxc.mount.entry: /dev/hidraw7 dev/hidraw7 none bind,optional,create=file
lxc.mount.entry: /dev/hidraw8 dev/hidraw8 none bind,optional,create=file
lxc.mount.entry: /dev/hidraw9 dev/hidraw9 none bind,optional,create=file
lxc.mount.auto: sys:rw
lxc.cgroup2.devices.allow: c 189:* rwm
lxc.mount.entry: /dev/bus/usb dev/bus/usb none bind,optional,create=dir
lxc.cgroup2.devices.allow: c 166:* rwm
