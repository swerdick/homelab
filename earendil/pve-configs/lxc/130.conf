## CT 130 %E2%80%94 Proxmox Backup Server (erebor)
#
#Debian 12 LXC running PBS for guest backups. Datastore on host `/bulk/pbs`. Replaces the previous host-level vzdump job for guest backups; vzdump still runs weekly to capture PBS config (see `pbs-config-weekly` job).
#
### Container config
#
#- **CT ID%3A** 130 %C2%B7 **Hostname%3A** `erebor` (`erebor.vingilot.internal`)
#- **Unprivileged%3A** yes %C2%B7 **Features%3A** `nesting=1`
#- **Template%3A** Debian 12 standard %C2%B7 2 cores %C2%B7 1 GiB RAM %C2%B7 8 GiB rootfs
#- **Network%3A** static IP 192.168.1.30 via router DHCP reservation (MAC `BC%3A24%3A11%3AB2%3ACF%3ABD`). No client-side static config %E2%80%94 all reservations on router.
#- **Onboot%3A** yes
#
### Bind mount
#
#Datastore is the single bind mount %E2%80%94 host `/bulk/pbs` (ZFS dataset, `compression=off` because PBS chunks are pre-compressed)%3A
#
#```
#pct set 130 -mp0 /bulk/pbs,mp=/datastore
#```
#
### Install
#
#Inside the LXC console, no-subscription PBS%3A
#
#```
#echo "deb http%3A//download.proxmox.com/debian/pbs bookworm pbs-no-subscription" \
#  > /etc/apt/sources.list.d/pbs-no-subscription.list
#
#wget https%3A//enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg \
#  -O /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg
#
#apt update
#apt install proxmox-backup-server
#```
#
### PBS UI bootstrap
#
#Web UI%3A <https%3A//erebor.vingilot.internal%3A8007> %C2%B7 log in as `root@pam`.
#
#1. **Datastore%3A** Datastore %E2%86%92 Add %E2%86%92 name `main`, backing path `/datastore`.
#2. **API token for host%3A** Configuration %E2%86%92 Access Control %E2%86%92 API Token. User `root@pam`, token name `earendil-host`, Privilege Separation off (or scope appropriately). Save the secret immediately %E2%80%94 shown once.
#3. **Note datastore fingerprint%3A** Configuration %E2%86%92 Certificates %E2%86%92 SHA-256 fingerprint.
#
### Host-side registration
#
#Datacenter %E2%86%92 Storage %E2%86%92 Add %E2%86%92 Proxmox Backup Server%3A
#- ID%3A `pbs-main`
#- Server%3A `erebor.vingilot.internal`
#- Datastore%3A `main`
#- Username%3A `root@pam!earendil-host`
#- Password%3A API token secret
#- Fingerprint%3A from PBS Certificates page
#
### Backup job
#
#`guests-to-pbs` %E2%80%94 defined at host level (Datacenter %E2%86%92 Backup), targets `pbs-main`, includes CTs 120, 121, VM 117.
#
#**No schedule on the job.** Triggered by host orchestrator at `/etc/systemd/system/nightly-backup.service` so the whole pipeline (vzdump %E2%86%92 PBS %E2%86%92 restic) stays sequenced and gets `Persistent=true` catch-up behavior.
#
### SSH
#
#`pseudo` user with key auth. Root SSH not permitted.
#
### Troubleshooting
#
#**"connection refused" from host to PBS%3A** firewall on container, or PBS service not running. `pct exec 130 -- systemctl status proxmox-backup`.
#
#**Fingerprint mismatch after PBS reinstall%3A** PBS regenerated certs. Update the fingerprint in Datacenter %E2%86%92 Storage %E2%86%92 pbs-main %E2%86%92 Edit.
#
#**Datastore appears empty after restart%3A** verify bind mount is alive%3A `pct exec 130 -- ls /datastore`. If empty, host-side mount config issue.
#
#**Logs%3A** `journalctl -u proxmox-backup` and `/var/log/proxmox-backup/tasks/` inside the LXC.
#
#Known quirk%3A On erebor (PBS), cert orders complete successfully but proxmox-backup-proxy may continue serving the previous cert until restarted. Reboot or systemctl restart proxmox-backup-proxy after any cert order/renewal. Earendil (PVE) does not have this issue
arch: amd64
cores: 2
features: nesting=1
hostname: erebor
memory: 1024
mp0: /bulk/pbs,mp=/datastore
net0: name=eth0,bridge=vmbr0,firewall=1,hwaddr=BC:24:11:B2:CF:BD,ip=dhcp,type=veth
onboot: 1
ostype: debian
rootfs: local-zfs:subvol-130-disk-0,size=16G
searchdomain: vingilot.internal
swap: 512
unprivileged: 1
