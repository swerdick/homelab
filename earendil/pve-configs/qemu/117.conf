## VM 117 %E2%80%94 Bazzite (anduril)
#
#KVM guest running Bazzite KDE for game streaming via Sunshine + Moonlight. Theme%3A the reforged gaming PC, like And%C3%BAril reforged from Narsil's shards.
#
### VM config
#
#- **VMID%3A** 117 %C2%B7 **Name%3A** `anduril` (`anduril.vingilot.internal`)
#- **OS%3A** Bazzite KDE (legacy `-nvidia` image) %C2%B7 NVIDIA driver 580.95.05
#- **Hardware%3A** 4 cores `cpu=host`, 10 GiB RAM (no ballooning)
#- **Firmware%3A** q35 + OVMF UEFI
#- **Disk%3A** 128 GiB on `local-zfs`, virtio-scsi-single with discard + iothread + SSD emulation
#- **Network%3A** static IP 192.168.1.17 via router DHCP reservation
#
### GPU passthrough
#
#Full-card passthrough of host GTX 970%3A
#
#```
#hostpci0%3A 0000%3A01%3A00,pcie=1,x-vga=1
#```
#
#Host-side prerequisites are documented in earendil host notes (kernel cmdline, vfio modules, NVIDIA blacklist, vfio.conf bind).
#
### USB passthrough
#
#Pass through directly attached peripherals%3A
#
#- Razer Basilisk V3 Pro%3A vendor%3Aproduct `1532%3A00aa`
#- Corsair K95 RGB Platinum%3A `1b1c%3A1b2d`
#
#```
#usb0%3A host=1532%3A00aa
#usb1%3A host=1b1c%3A1b2d
#```
#
### Sunshine %E2%80%94 use the native systemd unit
#
#**Don't run `ujust setup-sunshine`** %E2%80%94 it installs the Homebrew sunshine under `/home/linuxbrew`, which dies in VM passthrough with `Couldn't import RGB Image%3A 00003009`.
#
#The bazzite-nvidia image ships native `/usr/bin/sunshine` with a systemd user unit. Enable it directly%3A
#
#```
#systemctl --user enable --now app-dev.lizardbyte.app.Sunshine.service
#```
#
#`systemd --user` can't grant `AmbientCapabilities`, so the `CAP_SYS_NICE` warning persists in logs %E2%80%94 cosmetic, ignore.
#
### Moonlight tuning (Maxwell NVENC)
#
#GTX 970 is 2nd-gen NVENC. Constraints%3A
#
#- Force **H.264** in Moonlight client. HEVC is glitchy, AV1 unsupported, 10-bit rejected. The probe errors in Sunshine logs are noise.
#- LAN sweet spot%3A **1080p60 + 30%E2%80%9350 Mbps**. Native-res streaming chokes the encoder.
#- Enable Moonlight's **"Optimize mouse for remote desktop"** (absolute positioning) and **"Frame pacing"** for desktop use.
#
### Headless operation
#
#Requires HDMI dummy plug %E2%80%94 currently pending. Without one, monitor must be physically connected and powered for streaming to initialize the display pipeline.
#
### Backup
#
#Included in PBS backup job `guests-to-pbs` (CT 130 / erebor). PBS chunk-level dedup is significantly more space-efficient than vzdump for this VM %E2%80%94 game installs and OS files dedupe heavily across nightly snapshots.
#
### Troubleshooting
#
#**Black screen after VM start%3A** check `dmesg` on host for vfio reset issues. GTX 970 occasionally needs the VM stopped (not paused) and started fresh after host reboot before passthrough initializes cleanly.
#
#**Sunshine not finding display%3A** HDMI source not active. With dummy plug absent, monitor must be powered on and on the right input.
#
#**Moonlight encoder errors in Sunshine logs about HEVC/AV1/10-bit%3A** noise. Force H.264 client-side.
#
#**USB device not appearing%3A** check the `1532%3A00aa`-style ID matches. Replug-and-check with `lsusb` on host before adjusting VM config.
