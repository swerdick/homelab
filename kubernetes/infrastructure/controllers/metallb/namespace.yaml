apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
  labels:
    # MetalLB's speaker DaemonSet requires elevated privileges (raw sockets for ARP).
    # These labels are required when the cluster enforces pod security admission.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged