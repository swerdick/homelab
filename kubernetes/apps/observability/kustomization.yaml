apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - kube-prometheus-stack.yaml
  - grafana-admin.yaml
  - grafana-oauth.yaml
  # (grafana-tirion-ca ConfigMap is generated at the apps root from
  #  _shared/tirion-ca.crt - see kubernetes/apps/kustomization.yaml)
  - grafana-route.yaml
  - prometheus-route.yaml
  - prometheus-basic-auth.yaml
  - grafana-cloud-creds.yaml
  - loki.yaml
  - loki-basic-auth.yaml
  - loki-route.yaml
  - alloy.yaml
  - auto-water-datasource.yaml