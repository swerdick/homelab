# The plaintext password lives in ansible/group_vars/alloy/secrets.sops.yaml
# (`loki_basic_auth_password`) so the Alloy collectors can authenticate.
#
# To rotate: edit both files via `sops <path>`, regenerate the bcrypt with
#   htpasswd -nbB alloy "<new-password>"
