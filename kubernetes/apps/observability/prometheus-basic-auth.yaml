# Basic-auth credentials for prometheus.vingilot.internal.
# `users` is htpasswd-format (bcrypt), one user per line. Decoded contents
# look like:  alloy:$2y$05$...
#
# The plaintext password is stored separately in
# ansible/group_vars/alloy/secrets.sops.yaml (also SOPS-encrypted) so the
# Alloy collectors can authenticate.
#
# To rotate: edit both files via `sops <path>`, regenerate the bcrypt with
#   htpasswd -nbB alloy "<new-password>"
# and put the matching plaintext into the Ansible vars file.
