---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: immich
  namespace: flux-system
spec:
  interval: 24h
  url: https://immich-app.github.io/immich-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  timeout: 5m
  releaseName: immich
  chart:
    spec:
      chart: immich
      # Chart is at 0.x.y (currently 0.11.1) — `4.6.x` versions seen in the
      # index.yaml are the chart's appVersion (the Immich app it bundles),
      # not the chart's own version.
      version: ">=0.11.0 <0.12.0"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  # The chart depends on the immich-postgresql Cluster CR being present
  # when Immich starts (otherwise the immich-postgresql-app Secret it
  # reads doesn't exist yet). dependsOn at the HelmRelease level isn't
  # quite right (CNPG provisions the Secret asynchronously, not as part
  # of a HelmRelease); Immich pods will CrashLoopBackOff briefly until
  # CNPG creates the Secret, then settle.
  values:
    # ML enabled 2026-05-26 (the rest of the pipeline is validated and
    # earendil's 48 GiB upgrade retired the capacity ceiling). Adds ~1-2 GiB
    # RAM — CLIP + face-detection models held resident — and unlocks smart
    # search, face grouping, and content-aware tagging. Default CPU image
    # (gondor has no GPU passthrough; that lives on anduril).
    #
    # cache is a PVC, not the chart-default emptyDir, so the ~1.5 GiB of
    # downloaded models survive a pod restart instead of re-downloading on
    # every start. ReadWriteOnce is fine — single ML replica.
    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          type: persistentVolumeClaim
          accessMode: ReadWriteOnce
          size: 10Gi
          storageClass: nfs-scratch
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 100m
                  memory: 1Gi
                limits:
                  cpu: 2000m
                  memory: 3Gi

    # Bundled Valkey for the in-cluster job queue / cache. Single replica;
    # ephemeral by default (loses queue state on pod restart, which is fine
    # — Immich re-syncs jobs from Postgres on restart).
    valkey:
      enabled: true
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi

    # Photo library volume — pre-created PVC in library-pvc.yaml. Chart
    # docs explicitly say the volume must exist before this points at it.
    immich:
      persistence:
        library:
          existingClaim: immich-library

    # Wire DB_URL straight from CNPG's auto-generated app secret. The
    # `uri` key is the full postgresql:// connection string Immich expects.
    # bjw-s common library accepts dict-style env with object values for
    # valueFrom references.
    #
    # Resource limits cap the server pod, which also runs Immich's microservices
    # / thumbnail-and-transcode workers. Those workers spike memory far above
    # steady state during video metadata/thumbnail jobs (ffmpeg/ffprobe over the
    # bulk-media tree): working set sits ~600Mi-1.2Gi, but container_memory_max_
    # usage_bytes hit the cgroup ceiling — so a 3Gi limit OOMKilled the pod in a
    # loop (82 restarts/18d; see Loki: AssetExtractMetadata). Bumped to 6Gi for
    # headroom 2026-05-27; gondor is 6c/20G with room to spare. The real cure is
    # scoping the external library off the video tree + capping job concurrency
    # (Immich Admin UI) — the limit bump is the safety net, not the fix.
    #
    # request stays at 1Gi (steady-state footprint) so the scheduling reservation
    # is modest while the pod can burst to 6Gi under a job storm.
    controllers:
      main:
        containers:
          main:
            env:
              DB_URL:
                valueFrom:
                  secretKeyRef:
                    name: immich-postgresql-app
                    key: uri
              # Immich's server is Node.js — point it at the tirion root CA
              # (mounted via server.persistence.tirion-ca below) so OIDC discovery
              # + token requests to https://keycloak.vingilot.internal pass TLS
              # verification. Without it, Keycloak SSO fails ("unable to verify the
              # first certificate" — Node won't trust the internal CA otherwise).
              NODE_EXTRA_CA_CERTS: /etc/ssl/tirion/ca.crt
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                cpu: 2000m
                memory: 6Gi

    # External library mount for the existing /bulk/photos NFS export.
    # PV+PVC defined in bulk-photos-pv.yaml. This block is merged into the
    # server component (chart pattern: top-level keys under `server` extend
    # what server.yaml hardcodes), so the volume only mounts on the server
    # pod — not Valkey or anything else.
    #
    # supplementalGroups: 10000 matches the gid that owns files under
    # /bulk/photos on the NFS server (same strategy Jellyfin uses for
    # /bulk/media). Requires manage-gids=n on the NFS server — otherwise
    # nfsd ignores client-supplied groups and reads get EACCES regardless
    # of what we set here.
    server:
      defaultPodOptions:
        securityContext:
          supplementalGroups:
            - 10000
      persistence:
        bulk-photos:
          enabled: true
          type: persistentVolumeClaim
          existingClaim: immich-bulk-photos
          readOnly: true
          # Mount only on the server pod. Path is what we'll point the
          # External Library at in Immich's UI (Admin → Libraries).
          advancedMounts:
            main:
              main:
                - path: /mnt/external/bulk-photos
                  readOnly: true
        bulk-media:
          enabled: true
          type: persistentVolumeClaim
          existingClaim: immich-bulk-media
          readOnly: true
          # Whole /bulk/media tree is mounted; point Immich's UI at the
          # specific subfolders we want indexed — others (movies/, music/,
          # etc.) are visible but not added as libraries.
          advancedMounts:
            main:
              main:
                - path: /mnt/external/bulk-media
                  readOnly: true
        # tirion root CA for Keycloak OIDC TLS (see NODE_EXTRA_CA_CERTS above).
        # ConfigMap from tirion-ca-configmap.yaml; mounted read-only, server pod only.
        tirion-ca:
          enabled: true
          type: configMap
          name: immich-tirion-ca
          advancedMounts:
            main:
              main:
                - path: /etc/ssl/tirion
                  readOnly: true
