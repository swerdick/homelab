---
# Apps: everything under kubernetes/apps/, health-gated behind the
# infrastructure layer. dependsOn gives a fresh bootstrap real ordering
# (CRDs + controllers Ready before app HelmReleases/Certificates apply);
# wait: true surfaces app health on this Kustomization the same way the
# infrastructure pair do. Nothing dependsOn apps, so a NotReady app can
# never block the rest of the tree.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  dependsOn:
    - name: infrastructure-instances
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
