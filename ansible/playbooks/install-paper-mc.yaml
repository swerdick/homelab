---
# Install + manage a PaperMC server on eregion. Modelled on install-step-ca.yaml.
#
# - Idempotent: a re-run with no host_vars changes should report changed=0.
# - Bumping `paper_version` or `paper_build` in host_vars/eregion/main.yaml
#   refetches build metadata from Paper's v3 API, downloads the new JAR
#   (SHA256-verified against the API response), repoints the symlink, and
#   restarts the service via handler. See runbooks/paper-upgrade.md.
# - server.properties is managed key-by-key with community.general.ini_file
#   so Paper can keep its own auto-generated defaults for everything we
#   don't explicitly set — avoids fighting Paper on new options it adds in
#   future releases.

- name: Install and manage PaperMC on eregion
  # Explicit `hosts: eregion` (not a group) so a typo elsewhere can't run
  # this against the wrong host. The play also asserts hostname before
  # doing anything destructive — see first task.
  hosts: eregion
  vars:
    paper_home: /opt/minecraft
    paper_user: minecraft
    paper_group: minecraft
    paper_jar_symlink: "{{ paper_home }}/paper.jar"
    # Paper's v3 build-metadata endpoint. Returns the JAR's content-addressed
    # download URL + SHA256 — we use both, so a JAR substitution upstream
    # would be caught on download.
    paper_v3_build_url: "https://fill.papermc.io/v3/projects/paper/versions/{{ paper_version }}/builds/{{ paper_build }}"

    mcrcon_version: "0.7.2"
    mcrcon_zip_url: "https://github.com/Tiiffi/mcrcon/releases/download/v{{ mcrcon_version }}/mcrcon-{{ mcrcon_version }}-linux-x86-64-static.zip"
    mcrcon_zip_sha256: "790bfdd4f51245bc40f909e3a915f98cf569f57b0edf47697f5d72e0b86c2877"

  tasks:
    - name: Sanity-check that this is eregion
      ansible.builtin.assert:
        that:
          - inventory_hostname == "eregion"
          - ansible_facts.hostname == "eregion"
        fail_msg: >-
          install-paper-mc playbook is eregion-only; refusing to run against
          {{ inventory_hostname }} (live hostname {{ ansible_facts.hostname }}).

    - name: Install Java 25 and helpers
      # Paper 26.x requires JRE 25+. Trixie main has openjdk-25-jre-headless.
      ansible.builtin.apt:
        name:
          - openjdk-25-jre-headless
          - curl
          - jq
          - unzip
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Remove old Java 21 if Java 25 is installed (cleanup)
      ansible.builtin.apt:
        name: openjdk-21-jre-headless
        state: absent
        purge: true

    - name: Create '{{ paper_user }}' system user
      ansible.builtin.user:
        name: "{{ paper_user }}"
        system: true
        home: "{{ paper_home }}"
        shell: /usr/sbin/nologin
        create_home: false

    - name: Ensure {{ paper_home }} exists with correct ownership
      ansible.builtin.file:
        path: "{{ paper_home }}"
        state: directory
        owner: "{{ paper_user }}"
        group: "{{ paper_group }}"
        mode: "0750"

    # --- Paper JAR fetch via v3 API --------------------------------------

    - name: Fetch Paper v3 build metadata (URL + SHA256)
      # Two-step download: API returns a content-addressed URL at
      # fill-data.papermc.io plus the SHA256, both of which we then pass to
      # get_url. Cheaper than baking the SHA into host_vars by hand on every
      # bump and gives us automatic tamper detection. check_mode: false so
      # this read-only API call runs during --check previews too.
      ansible.builtin.uri:
        url: "{{ paper_v3_build_url }}"
        return_content: true
      register: paper_v3_build
      check_mode: false

    - name: Set Paper JAR facts from v3 metadata
      ansible.builtin.set_fact:
        paper_jar_filename: "{{ paper_v3_build.json.downloads['server:default'].name }}"
        paper_jar_url: "{{ paper_v3_build.json.downloads['server:default'].url }}"
        paper_jar_sha256: "{{ paper_v3_build.json.downloads['server:default'].checksums.sha256 }}"

    - name: Download Paper JAR (SHA256-verified)
      # `force: false` + the version+build-encoding filename keeps this
      # idempotent: same paper_version/paper_build → same filename → no-op
      # after first download.
      ansible.builtin.get_url:
        url: "{{ paper_jar_url }}"
        dest: "{{ paper_home }}/{{ paper_jar_filename }}"
        checksum: "sha256:{{ paper_jar_sha256 }}"
        owner: "{{ paper_user }}"
        group: "{{ paper_group }}"
        mode: "0644"
        force: false

    - name: Point /opt/minecraft/paper.jar at the active JAR
      ansible.builtin.file:
        src: "{{ paper_jar_filename }}"
        dest: "{{ paper_jar_symlink }}"
        state: link
        owner: "{{ paper_user }}"
        group: "{{ paper_group }}"
        # link target is relative, so the symlink stays valid regardless of
        # mount layout — important if paper_home ever becomes a bind mount.
      notify: Restart paper-server

    # --- mcrcon (small Go binary; not packaged in apt) -------------------

    - name: Check whether mcrcon is already installed at the desired version
      ansible.builtin.command:
        cmd: /usr/local/bin/mcrcon -v
      register: mcrcon_check
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Install mcrcon when missing or out of date
      when: mcrcon_check.rc != 0 or mcrcon_version not in (mcrcon_check.stdout | default(''))
      vars:
        mcrcon_zip_path: "/tmp/mcrcon-{{ mcrcon_version }}.zip"
        # The release zip extracts to mcrcon-<ver>-linux-x86-64-static/mcrcon,
        # not a top-level `mcrcon`. We strip the prefix at install time.
        mcrcon_archive_inner: "mcrcon-{{ mcrcon_version }}-linux-x86-64-static/mcrcon"
      block:
        - name: Download mcrcon release zip
          ansible.builtin.get_url:
            url: "{{ mcrcon_zip_url }}"
            dest: "{{ mcrcon_zip_path }}"
            checksum: "sha256:{{ mcrcon_zip_sha256 }}"
            mode: "0644"

        - name: Unpack mcrcon zip to /tmp
          ansible.builtin.unarchive:
            src: "{{ mcrcon_zip_path }}"
            dest: /tmp
            remote_src: true
            include:
              - "{{ mcrcon_archive_inner }}"

        - name: Install mcrcon binary into /usr/local/bin
          ansible.builtin.copy:
            src: "/tmp/{{ mcrcon_archive_inner }}"
            dest: /usr/local/bin/mcrcon
            remote_src: true
            owner: root
            group: root
            mode: "0755"

        - name: Clean up mcrcon temp artifacts
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - "{{ mcrcon_zip_path }}"
            - "/tmp/mcrcon-{{ mcrcon_version }}-linux-x86-64-static"

    # --- Paper config ----------------------------------------------------

    - name: Write eula.txt (you are accepting Mojang's EULA)
      ansible.builtin.copy:
        dest: "{{ paper_home }}/eula.txt"
        owner: "{{ paper_user }}"
        group: "{{ paper_group }}"
        mode: "0644"
        content: |
          # Accepted via ansible/playbooks/install-paper-mc.yaml.
          # https://www.minecraft.net/en-us/eula
          eula=true
      notify: Restart paper-server

    - name: Manage server.properties keys we care about
      # Paper auto-generates server.properties with sensible defaults on first
      # run. We only manage the specific keys we want pinned — leaves Paper
      # free to add new defaults across versions without us needing to
      # template the whole file.
      community.general.ini_file:
        path: "{{ paper_home }}/server.properties"
        section: null
        option: "{{ item.key }}"
        value: "{{ item.value | string }}"
        owner: "{{ paper_user }}"
        group: "{{ paper_group }}"
        mode: "0640"
        no_extra_spaces: true
        create: true
      loop:
        - { key: "motd", value: "{{ paper_motd }}" }
        - { key: "max-players", value: "{{ paper_max_players }}" }
        - { key: "view-distance", value: "{{ paper_view_distance }}" }
        - { key: "difficulty", value: "{{ paper_difficulty }}" }
        - { key: "enable-rcon", value: "true" }
        - { key: "rcon.port", value: "{{ paper_rcon_port }}" }
        - { key: "rcon.password", value: "{{ paper_rcon_password }}" }
        - { key: "broadcast-rcon-to-ops", value: "false" }
        - { key: "online-mode", value: "true" }
      loop_control:
        # label keeps the per-iteration output readable ("item=rcon.password")
        # instead of printing the full dict (which would leak the value).
        label: "{{ item.key }}"
      # no_log per-iteration: only suppress output when the key looks
      # password-shaped. Other keys stay visible in --diff for debugging.
      no_log: "{{ 'password' in item.key | lower }}"
      # Note on RCON exposure: vanilla Minecraft (which Paper inherits)
      # has no `rcon.bind` key — RCON always listens on 0.0.0.0. The PVE
      # firewall + LAN-only choice + strong rcon.password is adequate
      # defense for this threat model. If we ever want strict localhost-
      # only, add an nftables rule via a follow-up task that drops
      # non-lo packets to {{ paper_rcon_port }}.
      notify: Restart paper-server

    # --- systemd unit ----------------------------------------------------

    - name: Install paper-server systemd unit
      # no_log: the ExecStop line embeds paper_rcon_password — without this,
      # `--diff` would print the whole unit content (including the secret)
      # whenever the unit changes.
      no_log: true
      ansible.builtin.copy:
        dest: /etc/systemd/system/paper-server.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=PaperMC Minecraft server (eregion)
          Documentation=https://docs.papermc.io/paper
          After=network-online.target
          Wants=network-online.target
          StartLimitIntervalSec=60
          StartLimitBurst=3
          ConditionPathExists={{ paper_jar_symlink }}

          [Service]
          Type=simple
          User={{ paper_user }}
          Group={{ paper_group }}
          WorkingDirectory={{ paper_home }}
          ExecStart=/usr/bin/java -Xms{{ paper_heap }} -Xmx{{ paper_heap }} {{ paper_flags }} -jar {{ paper_jar_symlink }} --nogui
          # Clean shutdown: RCON `stop` triggers save-all + orderly exit
          # rather than a SIGTERM mid-tick. The `-` prefix tells systemd to
          # ignore mcrcon failures — if Paper is still booting (RCON not up
          # yet) or already crashed, we fall through to SIGTERM after
          # TimeoutStopSec instead of marking the unit failed (which would
          # trigger Restart=on-failure unnecessarily).
          ExecStop=-/usr/local/bin/mcrcon -H 127.0.0.1 -P {{ paper_rcon_port }} -p {{ paper_rcon_password }} stop
          Restart=on-failure
          RestartSec=10
          TimeoutStopSec=60
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=paper-server

          # Hardening — lighter than step-ca (the JVM needs more latitude)
          NoNewPrivileges=true
          ProtectSystem=full
          ReadWritePaths={{ paper_home }}
          ProtectHome=true
          PrivateTmp=true
          PrivateDevices=true
          ProtectKernelTunables=true
          ProtectKernelModules=true
          ProtectKernelLogs=true
          ProtectControlGroups=true
          RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6
          RestrictRealtime=true
          RestrictSUIDSGID=true

          [Install]
          WantedBy=multi-user.target
      register: paper_systemd_unit

    - name: Reload systemd if the unit file changed
      ansible.builtin.systemd:
        daemon_reload: true
      when: paper_systemd_unit.changed

    - name: Enable and start paper-server
      ansible.builtin.systemd:
        name: paper-server
        enabled: true
        state: started

  handlers:
    - name: Restart paper-server
      # Uses reload-or-restart so an in-place service update (no unit-file
      # change) still gets a clean restart.
      ansible.builtin.systemd:
        name: paper-server
        state: restarted
