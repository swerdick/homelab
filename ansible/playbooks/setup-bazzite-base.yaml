---
# Base configuration for Bazzite gaming VMs.
#
# Currently only anduril is in `bazzite_hosts`. This playbook captures the
# Bazzite-wide tweaks that aren't specific to sunshine itself — things that
# any Bazzite host configured as a Steam Machine target would need:
#
#   1. KDE Plasma power management disabled at the user-session level
#      (display never blanks, screen never locks). Without this, after the
#      idle timeout fires the display goes to DPMS-off, and any process
#      capturing the framebuffer (e.g. sunshine) wedges on an unreadable
#      framebuffer until the VM is rebooted.
#   2. A polkit rule that lets ansible-as-root manage systemd units without
#      interactive admin auth (Bazzite/Fedora gotcha — not sunshine-specific).
#   3. The currently-booted rpm-ostree deployment is pinned so it can never
#      age out as a rollback target, even after future deployments stage.
#   4. The `rpm-ostreed-automatic` timer + service are disabled, implementing
#      the "deliberate upgrade" pattern: image upgrades only happen when
#      explicitly invoked (e.g. `just patch-bazzite`).
#
# Structured as two plays so the become semantics are unambiguous (same
# pattern as setup-sunshine.yaml): the first runs as the SSH user (pseudo,
# no sudo) and only touches files in $HOME; the second runs as root.

- name: Configure KDE Plasma session for headless Steam Machine use
  hosts: bazzite_hosts
  gather_facts: false
  become: false
  # Inventory sets `ansible_become: true` for this host; clear it here so
  # the user-level tasks run as the SSH user (pseudo) without sudo.
  vars:
    ansible_become: false

  tasks:
    # Disable every KDE Plasma power-management action on the AC profile.
    # The empty `idleTime=` value is Plasma 6's documented "never trigger"
    # for these timed actions. We deliberately leave the file's other
    # contents alone (use of ini_file rather than copy) so Plasma's GUI
    # writes to unrelated profile sections are preserved.

    - name: Disable display DPMS-off on AC
      community.general.ini_file:
        path: ~/.config/powermanagementprofilesrc
        section: AC][DPMSControl
        option: idleTime
        value: ""
        mode: "0644"
        create: true
        no_extra_spaces: true

    - name: Disable display dimming on AC
      community.general.ini_file:
        path: ~/.config/powermanagementprofilesrc
        section: AC][DimDisplay
        option: idleTime
        value: ""
        mode: "0644"
        create: true
        no_extra_spaces: true

    - name: Disable session suspend on AC
      community.general.ini_file:
        path: ~/.config/powermanagementprofilesrc
        section: AC][SuspendSession
        option: idleTime
        value: ""
        mode: "0644"
        create: true
        no_extra_spaces: true

    # Disable the KDE screen locker daemon entirely. The locker also
    # blanks the display when it activates, so leaving Autolock=true
    # defeats the power-management disables above.

    - name: Disable KDE screen autolock
      community.general.ini_file:
        path: ~/.config/kscreenlockerrc
        section: Daemon
        option: Autolock
        value: "false"
        mode: "0644"
        create: true
        no_extra_spaces: true

    - name: Disable KDE lock-on-resume
      community.general.ini_file:
        path: ~/.config/kscreenlockerrc
        section: Daemon
        option: LockOnResume
        value: "false"
        mode: "0644"
        create: true
        no_extra_spaces: true


- name: Configure Bazzite host system state
  hosts: bazzite_hosts
  gather_facts: false
  become: true

  tasks:
    - name: Allow root to manage systemd units without interactive polkit auth
      # Fedora's default polkit policy requires `auth_admin` for systemd
      # unit-file management (`manage-unit-files`, `manage-units`,
      # `reload-daemon`), and an SSH+sudo session is not considered an
      # "active" polkit session — so even when ansible runs as root, every
      # `systemctl enable/start/etc.` gets denied with:
      #
      #   "Access denied as the requested operation requires interactive
      #    authentication. However, interactive authentication has not been
      #    enabled by the calling program."
      #
      # This rule grants the root user direct YES for those three actions,
      # which is the standard ansible-on-Fedora workaround. It doesn't
      # weaken security in any meaningful way: anything that already became
      # root could trivially edit unit files directly. Polkit picks up new
      # rules in /etc/polkit-1/rules.d/ via inotify with no reload needed.
      #
      # Must run before any later ansible.builtin.systemd tasks in this
      # play, since those depend on this rule being live.
      ansible.builtin.copy:
        dest: /etc/polkit-1/rules.d/50-ansible-systemd.rules
        mode: "0644"
        owner: root
        group: root
        content: |
          // Allow root to manage systemd units and unit files without
          // interactive admin auth. Required for ansible workflows over
          // SSH+sudo, where the calling session is not "active" in polkit's
          // view. Managed by ansible (setup-bazzite-base.yaml).
          polkit.addRule(function (action, subject) {
            if (
              subject.user === "root" &&
              (action.id === "org.freedesktop.systemd1.manage-units" ||
               action.id === "org.freedesktop.systemd1.manage-unit-files" ||
               action.id === "org.freedesktop.systemd1.reload-daemon")
            ) {
              return polkit.Result.YES;
            }
          });

    - name: Allow pseudo to invoke rpm-ostree operations over SSH
      # Same root cause as the systemd polkit rule above, different namespace.
      # rpmostreed's default policy for `org.projectatomic.rpmostree1.*` actions
      # requires an "active" polkit session — which an SSH login isn't. Without
      # this rule, `ujust update` (which we wrap with `just patch-bazzite`)
      # fails with:
      #
      #   error: rpmostreed OS operation Upgrade not allowed for user
      #
      # The rule grants the pseudo user direct YES for any rpm-ostree action.
      # We grant to pseudo rather than root because `ujust update` is invoked
      # as the SSH user (no sudo) — that's intentional, since most rpm-ostree
      # workflows expect to run as a non-privileged user that talks to
      # rpmostreed over dbus. Anyone who already has the pseudo SSH key can
      # already do anything on this VM, so this isn't a meaningful escalation.
      ansible.builtin.copy:
        dest: /etc/polkit-1/rules.d/51-ansible-rpmostree.rules
        mode: "0644"
        owner: root
        group: root
        content: |
          // Allow pseudo to invoke rpm-ostree operations via the rpmostreed
          // dbus interface (upgrade, deploy, rollback, cleanup, etc.). Required
          // for `just patch-bazzite` → `ujust update` to work over SSH, where
          // the calling session is not "active" in polkit's view. Managed by
          // ansible (setup-bazzite-base.yaml).
          polkit.addRule(function (action, subject) {
            if (
              action.id.indexOf("org.projectatomic.rpmostree1.") === 0 &&
              subject.user === "pseudo"
            ) {
              return polkit.Result.YES;
            }
          });

    # Pin the currently-booted ostree deployment so it stays as a permanent
    # rollback target. By default ostree only keeps two deployments (current
    # + one previous), so the rollback target ages out after a single
    # upgrade. Pinning prevents that.
    #
    # Deployment index 0 is the booted deployment when auto-updates are
    # disabled (no staged-but-not-active deployments). After this playbook
    # runs, that invariant is enforced by the rpm-ostreed-automatic disable
    # tasks below.

    - name: Read current rpm-ostree deployment status
      ansible.builtin.command: rpm-ostree status --json
      register: rpm_ostree_status
      changed_when: false
      # Force-run even in --check mode: this is a read-only probe and
      # later tasks' `when:` filters dereference its stdout. Without
      # this, the read is skipped in check mode and the JSON parse fails
      # on empty stdout.
      check_mode: false

    # If deployment 0 isn't the booted one, something is staged — almost
    # certainly an unwanted auto-staged image from rpm-ostreed-automatic
    # firing before we disabled it. Under the "deliberate upgrade mode"
    # we're establishing, surprise pending deployments get discarded;
    # the user runs `just patch-bazzite` when they actually want to stage
    # an upgrade. (ostree also refuses to pin a staged deployment, so
    # this cleanup is a prerequisite for the pin task below to land on
    # the correct index.)
    - name: Discard pending (staged) ostree deployment if present
      ansible.builtin.command: rpm-ostree cleanup --pending
      when: not (rpm_ostree_status.stdout | from_json).deployments[0].booted | default(false)

    - name: Re-read rpm-ostree status after potential cleanup
      ansible.builtin.command: rpm-ostree status --json
      register: rpm_ostree_status
      changed_when: false
      check_mode: false

    # Find the index of the deployment with booted=true. After cleanup
    # this is normally 0, but compute it dynamically so the playbook is
    # also correct in edge cases (multiple pinned old deployments etc.).
    - name: Determine booted ostree deployment index
      ansible.builtin.set_fact:
        booted_idx: |-
          {%- set deployments = (rpm_ostree_status.stdout | from_json).deployments -%}
          {%- for d in deployments -%}
            {%- if d.booted -%}{{ loop.index0 }}{%- endif -%}
          {%- endfor -%}

    - name: Pin booted ostree deployment if not already pinned
      ansible.builtin.command: "ostree admin pin {{ booted_idx }}"
      when: not (rpm_ostree_status.stdout | from_json).deployments[booted_idx | int].pinned | default(false)

    # Disable automatic image upgrades. Image upgrades on the GTX 970 +
    # vfio passthrough stack have historically broken cold-start behavior
    # (e.g. the 2026-05-08 regression); they now happen only when explicitly
    # invoked via `just patch-bazzite`.

    - name: Disable rpm-ostreed-automatic.timer
      ansible.builtin.systemd:
        name: rpm-ostreed-automatic.timer
        enabled: false
        state: stopped

    - name: Disable rpm-ostreed-automatic.service
      ansible.builtin.systemd:
        name: rpm-ostreed-automatic.service
        enabled: false
        state: stopped
