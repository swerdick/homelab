---
# Pin the Proxmox VE host kernel to a known-good version.
#
# Proxmox's `proxmox-default-kernel` meta-package can roll the host onto a
# new kernel series during routine upgrades; this playbook makes the choice
# explicit and persistent across reboots by writing /etc/kernel/proxmox-boot-pin
# and refreshing the EFI System Partitions. Bump `proxmox_kernel_pin` to
# move the host forward intentionally.
#
# Currently only earendil is in `proxmox_hosts`.

- name: Pin Proxmox boot kernel on Proxmox VE hosts
  hosts: proxmox_hosts
  become: true
  gather_facts: false

  vars:
    # Pin the host to a known-good Proxmox kernel.
    #
    # proxmox-kernel-7.0.0-3-pve (which became proxmox-default-kernel as of
    # 2026-04-29) introduced a vfio-pci / KVM regression that prevents the
    # GTX 970 (Maxwell GM204) from initializing inside the anduril VM —
    # `NVRM: GPU 0000:01:00.0: RmInitAdapter failed! (0x24:0x72:1590)` after
    # the kernel module loads. 6.17.13-4-pve is the last known-good kernel
    # for that passthrough path.
    #
    # Revisit when a later 7.0.x point release ships; unpin and test before
    # changing this value.
    proxmox_kernel_pin: "6.17.13-4-pve"

  tasks:
    - name: Pin Proxmox boot kernel
      ansible.builtin.copy:
        dest: /etc/kernel/proxmox-boot-pin
        content: "{{ proxmox_kernel_pin }}\n"
        owner: root
        group: root
        mode: "0644"
      register: kernel_pin

    - name: Refresh boot ESPs after pin change
      ansible.builtin.command: proxmox-boot-tool refresh
      when: kernel_pin is changed
      changed_when: true
