---
# Manage the Proxmox VE host boot-kernel pin.
#
# History: a pin to 6.17.13-4-pve was added because proxmox-kernel-7.0.0
# (which became proxmox-default-kernel on 2026-04-29) carried a vfio-pci /
# KVM regression that stopped the GTX 970 (Maxwell GM204) initializing in
# the anduril passthrough VM (`RmInitAdapter failed!`). That card has been
# replaced by an AMD RX 9070 XT and anduril is moving off passthrough to an
# LXC sharing the host's amdgpu (kernel 7.0 is fine-to-better for RDNA4), so
# the pin is obsolete. Default is now UNPINNED — the host floats on
# proxmox-default-kernel again.
#
# To deliberately pin again, set `proxmox_kernel_pin` to a version string
# (e.g. -e proxmox_kernel_pin=6.17.13-4-pve); empty (default) ensures the
# pin file is absent. Either way refreshes the ESPs. Effective on next boot.
#
# Currently only earendil is in `proxmox_hosts`.

- name: Manage Proxmox boot-kernel pin on Proxmox VE hosts
  hosts: proxmox_hosts
  become: true
  gather_facts: false

  vars:
    # Empty = unpinned (let proxmox-default-kernel win). Set to a version
    # string to pin. See header for history.
    proxmox_kernel_pin: ""

  tasks:
    - name: Remove the boot-kernel pin (unpinned — default)
      ansible.builtin.file:
        path: /etc/kernel/proxmox-boot-pin
        state: absent
      when: proxmox_kernel_pin | length == 0
      register: kernel_unpin

    - name: Pin the boot kernel (only when a version is set)
      ansible.builtin.copy:
        dest: /etc/kernel/proxmox-boot-pin
        content: "{{ proxmox_kernel_pin }}\n"
        owner: root
        group: root
        mode: "0644"
      when: proxmox_kernel_pin | length > 0
      register: kernel_pin

    - name: Refresh boot ESPs after a pin change
      ansible.builtin.command: proxmox-boot-tool refresh
      when: (kernel_unpin is changed) or (kernel_pin is changed)
      changed_when: true
