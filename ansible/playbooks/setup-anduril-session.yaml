---
# In-guest setup for the anduril gaming LXC (CT 117): a KWin-Wayland session that
# autostarts Steam Big Picture on the TV, with PipeWire audio to HDMI. Pairs with
# the host-side setup-anduril-lxc.yaml (device passthrough) + setup-amdgpu-host.yaml.
#
# Why KWin and not gamescope: gamescope needs a VT to activate its libseat seat,
# which a container lacks; KWin tolerates the VT-less seatd seat. The desktop
# pointer is unusable (libinput needs a VT), so the controller drives Steam
# directly via /dev/input + /dev/hidraw. See [[project-anduril-lxc-spike]].
#
# NOTE: the CT is now SSH/sudo-onboarded; this play verified drift-free against the
# live container via `--check --diff` (changed=0, 2026-06-25). It was originally
# transcribed from a hand-built + reboot-tested container.
# Run order in site-anduril.yaml: after the base/pseudo-user plays.

- name: Configure the anduril in-guest gaming session
  hosts: anduril
  become: true
  gather_facts: true

  vars:
    session_user: pseudo
    # GID-by-name groups that own the passed-through devices in the container:
    # video=card0, render/clock=renderD129+kfd, audio=snd, input=event*, seat=seatd.
    device_groups: [audio, video, input, render, seat]

  tasks:
    - name: Enable i386 multiarch (Steam)
      ansible.builtin.command: dpkg --add-architecture i386
      register: i386
      changed_when: false

    - name: Read the currently-enabled apt components (deb822 ubuntu.sources)
      # apt_repository's bare-component shortcut ("universe") is rejected by
      # current ansible-core ("Invalid repository string"); drive
      # add-apt-repository directly instead, guarded so it's a clean no-op when
      # the components are already on the Components: line.
      ansible.builtin.command: grep '^Components:' /etc/apt/sources.list.d/ubuntu.sources
      register: ubuntu_components
      changed_when: false
      check_mode: false

    - name: Enable universe + multiverse repos
      ansible.builtin.command: "add-apt-repository -y -n {{ item }}"
      loop:
        - universe
        - multiverse
      when: item not in ubuntu_components.stdout.split()

    - name: Preseed Steam license (non-interactive)
      ansible.builtin.debconf:
        name: steam
        question: steam/question
        vtype: select
        value: "I AGREE"

    - name: Install the gaming + session stack
      ansible.builtin.apt:
        update_cache: true
        name:
          - kwin-wayland
          - xwayland
          - seatd
          - kscreen            # provides kscreen-doctor (output mgmt)
          - dbus-user-session
          - libnotify-bin
          - steam-installer
          - mesa-vulkan-drivers
          - mesa-vulkan-drivers:i386
          - mesa-va-drivers
          - libgl1-mesa-dri
          - libgl1-mesa-dri:i386
          - vulkan-tools
          - vainfo
          - pipewire
          - pipewire-pulse
          - wireplumber
          - pulseaudio-utils
          # Steam's controller firmware-update tool needs both hidapi backends;
          # Kubuntu ships hidraw but not libusb, so the SC2/Puck firmware wizard can
          # hang on a blank dialog (ValveSoftware/steam-for-linux#13171, Bug 1).
          - libhidapi-libusb0

    - name: Ensure the seat group exists
      ansible.builtin.group:
        name: seat
        state: present

    - name: Create the session user
      ansible.builtin.user:
        name: "{{ session_user }}"
        uid: 1000
        shell: /bin/bash
        create_home: true

    - name: Add the session user to device groups
      ansible.builtin.user:
        name: "{{ session_user }}"
        groups: "{{ device_groups }}"
        append: true

    - name: Grant the session user access to game controllers + uinput (udev)
      # The CT runs its OWN systemd-udevd, which (like the host) tags Valve/Sony
      # controller hidraw nodes `uaccess` -> systemd-logind clamps them to
      # root:root 0660 and adds an ACL only for an active *seat* user. pseudo has
      # no seat in this VT-less LXC, so Steam (as pseudo) can't open the hidraw to
      # take the controller out of lizard mode (firmware mouse/kbd emulation) or
      # create the virtual gamepad via uinput -> "No controller connected". Strip
      # the uaccess tag (stops logind managing the node) and set world-rw on the
      # controller hidraws, the raw-USB nodes (so Steam can flash firmware over
      # the controller's bootloader, 28de:1007 — needs /dev/bus/usb passthrough
      # from setup-anduril-lxc.yaml), and uinput. The CT's udev is the last
      # writer on the bind-mounted /dev/bus/usb nodes, so the usb rule must live
      # here (a host-only rule gets overwritten). Valve = 28de, Sony = 054c.
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/99-anduril-controllers.rules
        owner: root
        group: root
        mode: "0644"
        content: |
          SUBSYSTEM=="hidraw", ATTRS{idVendor}=="28de", TAG-="uaccess", MODE="0666"
          SUBSYSTEM=="hidraw", ATTRS{idVendor}=="054c", TAG-="uaccess", MODE="0666"
          SUBSYSTEM=="usb", ATTR{idVendor}=="28de", TAG-="uaccess", MODE="0666"
          SUBSYSTEM=="usb", ATTR{idVendor}=="054c", TAG-="uaccess", MODE="0666"
          SUBSYSTEM=="tty", ATTRS{idVendor}=="28de", TAG-="uaccess", MODE="0666"
          KERNEL=="uinput", MODE="0666", OPTIONS+="static_node=uinput"
      notify: Reload udev rules

    - name: Disable the KWin screen locker (kiosk)
      ansible.builtin.copy:
        dest: "/home/{{ session_user }}/.config/kscreenlockerrc"
        owner: "{{ session_user }}"
        group: "{{ session_user }}"
        mode: "0644"
        content: |
          [Daemon]
          Autolock=false
          LockOnResume=false
          Timeout=0

    - name: Disable KDE Wallet (no usable keyboard for the unlock prompt)
      # Electron apps (Spotify/Discord) reach the Secret Service via
      # xdg-desktop-portal, which pops a kwallet unlock dialog. On the
      # controller-only TV that dialog can't be answered (the OSK can't inject
      # into a KWin window — the VT-less libinput gap), so it blocks the app
      # every launch. Disable the wallet; Electron safeStorage falls back to
      # plaintext, which is fine on a single-user kiosk.
      ansible.builtin.copy:
        dest: "/home/{{ session_user }}/.config/kwalletrc"
        owner: "{{ session_user }}"
        group: "{{ session_user }}"
        mode: "0644"
        content: |
          [Wallet]
          Enabled=false
          First Use=false

    - name: Ensure the WirePlumber user config dir exists
      ansible.builtin.file:
        path: "/home/{{ session_user }}/.config/wireplumber/wireplumber.conf.d"
        state: directory
        owner: "{{ session_user }}"
        group: "{{ session_user }}"
        mode: "0755"

    - name: Pin the AMD HDMI profile + disable suspend-on-idle (WirePlumber drop-in)
      # Two rules for the TV's audio sink:
      #  1. Profile pin: WirePlumber parks the HDMI card 'off' whenever it judges
      #     the port unavailable (at boot before the TV EDID is ready, and when Steam
      #     Big Picture's startup mode-set flaps the HDMI link), dropping the sink.
      #     Disable auto-profiling + force the HDMI output profile so it survives.
      #  2. No suspend-on-idle: WirePlumber suspends an idle node after 5s
      #     (suspend-node.lua; session.suspend-timeout-seconds=0 disables it). In
      #     this LXC the HDMI sink suspends ~5s in and the resume fails, so audio
      #     dies until a session restart — the "came back for 5s then dropped" bug.
      ansible.builtin.copy:
        dest: "/home/{{ session_user }}/.config/wireplumber/wireplumber.conf.d/51-anduril-hdmi.conf"
        owner: "{{ session_user }}"
        group: "{{ session_user }}"
        mode: "0644"
        content: |
          monitor.alsa.rules = [
            {
              matches = [ { device.name = "alsa_card.pci-0000_03_00.1" } ]
              actions = {
                update-props = {
                  api.acp.auto-profile = false
                  device.profile = "output:hdmi-stereo-extra3"
                }
              }
            }
            {
              matches = [ { node.name = "alsa_output.pci-0000_03_00.1.hdmi-stereo-extra3" } ]
              actions = {
                update-props = {
                  session.suspend-timeout-seconds = 0
                }
              }
            }
          ]

    - name: Remove the obsolete no-suspend drop-in (folded into 51-anduril-hdmi)
      # An earlier attempt used `wireplumber.settings { node.suspend-timeout-seconds }`
      # — not a valid WP 0.5 setting (verified live: "Setting ... not found"). The
      # working form is the per-node property session.suspend-timeout-seconds, now a
      # rule in 51-anduril-hdmi.conf. Drop the stale no-op file.
      ansible.builtin.file:
        path: "/home/{{ session_user }}/.config/wireplumber/wireplumber.conf.d/52-anduril-no-suspend.conf"
        state: absent

    - name: Install a transparent ("blank") cursor theme for the kiosk
      # KWin draws its built-in cursor sprite dead-center on this VT-less session and
      # no pointer ever moves or hides it (libinput enumerates nothing —
      # [[project-anduril-lxc-spike]]); Steam's Desktop Layout is NOT the source
      # (tested 2026-06-26, the cursor persisted). Fix: a fully-transparent Xcursor
      # theme for both KWin (kcminputrc) and Xwayland (XCURSOR_THEME in the launcher).
      # python3 writes a 1x1 transparent Xcursor (no xcursorgen/imagemagick dep); the
      # common cursor names symlink to it. Guarded by `creates`.
      become_user: "{{ session_user }}"
      ansible.builtin.shell:
        executable: /bin/bash
        creates: "/home/{{ session_user }}/.local/share/icons/blank/cursors/left_ptr"
        cmd: |
          set -euo pipefail
          theme="$HOME/.local/share/icons/blank"
          mkdir -p "$theme/cursors"
          python3 - "$theme/cursors/left_ptr" <<'PY'
          import struct, sys
          sizes = (16, 24, 32, 48, 64)
          imgs = [struct.pack('<IIIIIIIIII', 36, 0xfffd0002, s, 1, 1, 1, 0, 0, 0, 0) for s in sizes]
          toc, pos = b'', 16 + len(sizes) * 12
          for s, im in zip(sizes, imgs):
              toc += struct.pack('<III', 0xfffd0002, s, pos); pos += len(im)
          data = b'Xcur' + struct.pack('<III', 16, 0x00010000, len(sizes)) + toc + b''.join(imgs)
          open(sys.argv[1], 'wb').write(data)
          PY
          cd "$theme/cursors"
          for n in default arrow pointer top_left_arrow text xterm hand1 hand2 \
                   crosshair watch left_ptr_watch fleur question_arrow \
                   sb_h_double_arrow sb_v_double_arrow; do
            ln -sf left_ptr "$n"
          done
          printf '[Icon Theme]\nName=blank\nComment=Transparent cursor for the anduril kiosk\n' > "$theme/index.theme"

    - name: Point KWin at the blank cursor theme (kcminputrc)
      # Belt-and-suspenders to XCURSOR_THEME — KWin also reads the Wayland cursor
      # theme from here.
      become_user: "{{ session_user }}"
      ansible.builtin.copy:
        dest: "/home/{{ session_user }}/.config/kcminputrc"
        owner: "{{ session_user }}"
        group: "{{ session_user }}"
        mode: "0644"
        content: |
          [Mouse]
          cursorTheme=blank
          cursorSize=24

    - name: Install the session launcher
      ansible.builtin.copy:
        dest: /usr/local/bin/anduril-session.sh
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/bash
          export HOME=/home/pseudo
          export XDG_RUNTIME_DIR=/run/user/1000
          export XDG_SESSION_TYPE=wayland
          export XDG_CURRENT_DESKTOP=KDE
          export LIBSEAT_BACKEND=seatd
          export KWIN_DRM_DEVICES=/dev/dri/card0
          # No direct scanout: when a fullscreen game takes over the display plane
          # and releases it on exit, the HDMI link flaps — which (a) corrupts
          # Sunshine's KMS capture (the garbage top-band) and (b) knocks the AMD HDMI
          # audio card out of WirePlumber, silencing the TV (incl. Steam menu tones)
          # until a session restart — the every-game-exit audio drop. Forcing KWin to
          # always composite keeps the output stable across game launch/exit.
          export KWIN_DRM_NO_DIRECT_SCANOUT=1
          # Hide the dead-center cursor KWin/Xwayland draw on this pointer-less
          # session (no input device ever moves or hides it). A fully-transparent
          # cursor theme (installed by the blank-cursor task) applied to KWin's
          # Wayland cursor + Xwayland's X cursor. XCURSOR_PATH is explicit so the
          # ~/.local theme is always found.
          export XCURSOR_THEME=blank
          export XCURSOR_SIZE=24
          export XCURSOR_PATH="$HOME/.local/share/icons:/usr/share/icons"
          export PATH=/usr/games:/usr/bin:/bin
          exec dbus-run-session -- /usr/local/bin/anduril-inner.sh

    - name: Enable systemd linger for the session user
      # The kiosk runs as a SYSTEM service (anduril-session.service), so it has no
      # systemd --user instance of its own — historically why anduril-inner.sh
      # hand-started PipeWire. linger keeps user@1000 (and its PipeWire/WirePlumber)
      # running at boot regardless of login, so the kiosk AND any xrdp/ssh login
      # share ONE PipeWire instead of two fighting over the HDMI card. Idempotent.
      ansible.builtin.command:
        cmd: loginctl enable-linger {{ session_user }}
        creates: "/var/lib/systemd/linger/{{ session_user }}"

    - name: Install the inner session (audio + output + kwin->steam)
      ansible.builtin.copy:
        dest: /usr/local/bin/anduril-inner.sh
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/bash
          # Use the per-user PipeWire (systemd --user) — do NOT start a second manual
          # stack. Running both (this kiosk's manual stack + the --user services any
          # pseudo login/xrdp/ssh session auto-starts) put two pipewire/wireplumber
          # instances on /run/user/1000 fighting over the AMD HDMI card → TV audio
          # silently dropped. `loginctl enable-linger` (task above) keeps user@1000
          # and its PipeWire up for this system-service session; here we just make
          # sure the stack is started before the routing below.
          systemctl --user start pipewire.socket pipewire-pulse.socket wireplumber.service 2>/dev/null || true
          (
            for i in $(seq 1 40); do [ -S "${XDG_RUNTIME_DIR}/wayland-0" ] && break; sleep 1; done
            sleep 2
            # TV is the only/primary output (disable the DP-3 dummy)
            WAYLAND_DISPLAY=wayland-0 kscreen-doctor output.HDMI-A-4.enable output.HDMI-A-4.priority.1 output.DP-3.disable 2>/dev/null || true
            # route audio to the AMD HDMI (TV) sink. The WirePlumber drop-in
            # (51-anduril-hdmi.conf) pins this card's HDMI profile so the sink is
            # always present; here we just make it the default.
            for i in $(seq 1 20); do
              HDMI=$(pactl list short sinks 2>/dev/null | grep -iE "03_00.1" | head -1 | awk '{print $2}')
              [ -n "$HDMI" ] && { pactl set-default-sink "$HDMI" 2>/dev/null; break; }
              sleep 1
            done
          ) &
          # Audio self-heal watchdog: if the AMD HDMI card ever drops out of PipeWire
          # (kernel still lists "HDA ATI HDMI" but the alsa_card is gone from PW),
          # restart the SINGLE systemd-managed wireplumber to re-add it. systemctl
          # restart (not the old pkill + manual respawn) can't leave duplicate
          # wireplumbers. On session stop systemd kills this subshell with the cgroup.
          (
            while true; do
              sleep 8
              if grep -q "HDA ATI HDMI" /proc/asound/cards 2>/dev/null \
                 && ! pactl list short cards 2>/dev/null | grep -q "alsa_card.pci-0000_03_00.1"; then
                systemctl --user restart wireplumber.service 2>/dev/null || true
              fi
            done
          ) &
          # Game-stream host for Moonlight. Starts only if Sunshine is installed
          # (setup-anduril-sunshine.yaml), so the session still works without it.
          # KMS capture needs the live KWin session + wayland output, so it waits
          # for the socket. Launching it here ties it to the session lifecycle:
          # it comes up on container boot and on every `just restart-anduril`,
          # with no separate systemd unit to keep in sync.
          if command -v sunshine >/dev/null 2>&1; then
            (
              for i in $(seq 1 40); do [ -S "${XDG_RUNTIME_DIR}/wayland-0" ] && break; sleep 1; done
              sleep 3
              # Respawn loop: a Sunshine crash (e.g. a failed stream whose teardown
              # hangs -> Fatal, which strands the Moonlight host) otherwise stays
              # down until the session is restarted. Relaunch with a short backoff so
              # it self-heals. On session stop systemd kills this subshell with the
              # cgroup, so the loop can't respawn during shutdown.
              while true; do
                env WAYLAND_DISPLAY=wayland-0 sunshine
                sleep 2
              done
            ) &
          fi
          exec kwin_wayland --xwayland /usr/local/bin/steam-bigpicture.sh

    - name: Install the Steam Big Picture launcher
      ansible.builtin.copy:
        dest: /usr/local/bin/steam-bigpicture.sh
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/bash
          # Run Steam INSIDE gamescope so Steam Input's emulated "As Mouse" pointer
          # reaches games via gamescope's libei/EIS socket. KWin does NOT honor the
          # XTEST pointer-warp Steam Input uses on the bare desktop (keys/scroll/clicks
          # land, cursor motion does not) -- gamescope-with-libei is the transport that
          # fixes it. Per-game gamescope (Steam OUTSIDE) does NOT work: Steam Input then
          # injects into the outer KWin, not the game's gamescope (gamescope #1307).
          # VALIDATED 2026-06-27: SC2 right-trackpad fully drives Stellaris's cursor.
          #   -e                  : Steam mode + focus for the nested gamepad UI (#1365)
          #   --backend sdl       : nested fullscreen on KDE Plasma 6 Wayland (#1356)
          #   --force-grab-cursor : route relative pointer motion into the game (#1428)
          #   --xwayland-count 2 + STEAM_MULTIPLE_XWAYLANDS=1 : Steam + game each get one
          # Prereq: gamescope must be built with libei (libeis.so linked) -- verified.
          # Couch-readable UI on the 4K panel: lower each game's render res via its Steam
          # resolution property; gamescope upscales to -W/-H.
          exec env STEAM_MULTIPLE_XWAYLANDS=1 gamescope \
            -e -f --backend sdl -W 3840 -H 2160 -r 60 --xwayland-count 2 --force-grab-cursor \
            -- steam -gamepadui

    - name: Force the gamescope session window fullscreen on the TV (KWin rule)
      # A Steam client update can knock the gamescope SDL window out of fullscreen
      # (KWin re-decorates it as a normal window -> windowed Big Picture). Everything
      # now runs INSIDE gamescope, so it's the only window KWin manages -- force it
      # fullscreen + borderless by matching ANY title (titlematch=3 = regex). Applied
      # at KWin startup, so `just restart-anduril` picks it up. Supersedes the old
      # per-app Spotify rule (Spotify now fullscreens within gamescope itself).
      ansible.builtin.copy:
        dest: "/home/{{ session_user }}/.config/kwinrulesrc"
        owner: "{{ session_user }}"
        group: "{{ session_user }}"
        mode: "0644"
        content: |
          [General]
          count=1
          rules=2e7a5d9b-6c3f-4b02-cd4e-6f1a8b0c3d12

          [2e7a5d9b-6c3f-4b02-cd4e-6f1a8b0c3d12]
          Description=Force the gamescope session window fullscreen + borderless on the TV
          fullscreen=true
          fullscreenrule=2
          noborder=true
          noborderrule=2
          title=.*
          titlematch=3

    - name: Bootstrap Steam non-interactively (skip the first-run zenity prompt)
      # The Ubuntu steam wrapper pops a zenity "Install Steam?" dialog on first
      # run (un-clickable here — desktop pointer is dead). Auto-accept via a
      # throwaway zenity stub so the wrapper downloads + extracts the client.
      # Guarded: only runs until the bootstrap exists.
      become_user: "{{ session_user }}"
      ansible.builtin.shell: |
        set -e
        mkdir -p /tmp/steam-firstrun
        printf '#!/bin/sh\nexit 0\n' > /tmp/steam-firstrun/zenity
        chmod +x /tmp/steam-firstrun/zenity
        timeout 300 env PATH=/tmp/steam-firstrun:/usr/games:/usr/bin:/bin steam --headless +quit >/dev/null 2>&1 || true
      args:
        creates: "/home/{{ session_user }}/.steam/debian-installation/steam.sh"

    # Register the 600G /games ZFS dataset as a Steam library folder. The host
    # chowns it to pseudo (setup-anduril-lxc.yaml); here we add it to Steam's
    # libraryfolders.vdf so installs can target it and Steam reports its real
    # free space. (Earlier attempt — a steamapps->/games symlink — made Steam
    # mis-report the rootfs's free space and refuse >60G installs.) We write a
    # MINIMAL vdf (paths only); Steam repopulates contentid/totalsize/apps and
    # adopts any existing appmanifests on next launch. Guarded so it only writes
    # when /games isn't already registered (Steam rewrites the file at runtime).
    - name: Check whether /games is already a registered Steam library
      ansible.builtin.command: >
        grep -q '"/games"'
        /home/{{ session_user }}/.steam/debian-installation/steamapps/libraryfolders.vdf
      register: games_lib_registered
      changed_when: false
      failed_when: false

    - name: Register /games as a Steam library folder
      ansible.builtin.copy:
        dest: "{{ item }}"
        owner: "{{ session_user }}"
        group: "{{ session_user }}"
        mode: "0644"
        content: |
          "libraryfolders"
          {
          	"0"
          	{
          		"path"		"/home/{{ session_user }}/.steam/debian-installation"
          	}
          	"1"
          	{
          		"path"		"/games"
          	}
          }
      loop:
        - "/home/{{ session_user }}/.steam/debian-installation/steamapps/libraryfolders.vdf"
        - "/home/{{ session_user }}/.steam/debian-installation/config/libraryfolders.vdf"
      when: games_lib_registered.rc != 0

    - name: Relocate the Steam shader cache onto the SSD rootfs (symlink)
      # The games library (/games) is on the WD Blue HDD. Vulkan shader
      # pre-caching (Fossilize) is disk-bound there: replaying the downloaded
      # pipeline cache is seek-heavy and starves the compile (measured ~77% HDD
      # busy, climbing iowait). The CT rootfs is on the SSD (rpool), so move the
      # regenerable shadercache there and symlink it back — Steam follows the
      # link. Symlinking only this subdir (not all of steamapps) does NOT affect
      # library free-space reporting, so it avoids the >60G-install bug the
      # whole-steamapps symlink caused. Idempotent: the symlink is the guard;
      # handles both fresh (no cache yet) and existing (move HDD->SSD) cases.
      become_user: "{{ session_user }}"
      ansible.builtin.shell: |
        set -e
        SC="/games/steamapps/shadercache"
        DEST="$HOME/.local/share/steam-shadercache"
        mkdir -p "$DEST" "/games/steamapps"
        if [ -L "$SC" ]; then echo "already-linked"; exit 0; fi
        if [ -d "$SC" ]; then
          cp -a "$SC"/. "$DEST"/ 2>/dev/null || true
          rm -rf "$SC"
        fi
        ln -s "$DEST" "$SC"
        echo "relocated"
      args:
        executable: /bin/bash
      register: shadercache_relocate
      changed_when: "'relocated' in shadercache_relocate.stdout"

    - name: Enable seatd + the session boot service
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        daemon_reload: true
      loop:
        - seatd.service

    - name: Install the graceful-stop helper (flush Steam on session stop)
      # Steam only writes its prefs (settings, controller state) to
      # localconfig.vdf on a *clean* exit. SIGKILLing it (the old restart
      # recipe) loses those writes. Run `steam -shutdown` as the session ExecStop
      # so every `systemctl stop`/restart + reboot flushes cleanly; systemd's
      # TimeoutStopSec backstops a hung Steam. (Note: does NOT fix the SC2 puck's
      # recurring intro dialog — see [[project-anduril-sc2-puck-linux-bugs]] —
      # this is config-persistence hygiene.)
      ansible.builtin.copy:
        dest: /usr/local/bin/anduril-stop.sh
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/bash
          export HOME=/home/pseudo
          export XDG_RUNTIME_DIR=/run/user/1000
          export PATH=/usr/games:/usr/bin:/bin
          steam -shutdown >/dev/null 2>&1 || true
          for i in $(seq 1 20); do pgrep -x steam >/dev/null 2>&1 || break; sleep 1; done

    - name: Install the session boot service
      ansible.builtin.copy:
        dest: /etc/systemd/system/anduril-session.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Anduril gaming session (KWin + Steam Big Picture)
          After=seatd.service network-online.target
          Wants=seatd.service network-online.target

          [Service]
          Type=simple
          User=pseudo
          Group=pseudo
          Environment=XDG_RUNTIME_DIR=/run/user/1000
          ExecStartPre=+/usr/bin/install -d -o pseudo -g pseudo -m 700 /run/user/1000
          ExecStart=/usr/local/bin/anduril-session.sh
          ExecStop=/usr/local/bin/anduril-stop.sh
          Restart=on-failure
          RestartSec=5
          TimeoutStartSec=0
          TimeoutStopSec=30

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable the session boot service
      ansible.builtin.systemd:
        name: anduril-session.service
        enabled: true
        daemon_reload: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Reload udev rules
      ansible.builtin.shell: udevadm control --reload-rules && udevadm trigger --action=add --subsystem-match=hidraw
      changed_when: false
