---
# Entry point for configuring anduril (the Kubuntu gaming VM) end-to-end.
#
# anduril was replatformed from Bazzite to Kubuntu 26.04 LTS in May 2026
# (see terraform/descriptions/anduril.md). It now follows the standard Debian
# fleet bootstrap, with the Sunshine play layered on last:
#
#   1. setup-pseudo-user.yaml           — pseudo user + NOPASSWD sudo + SSH key
#   2. setup-debian-base.yaml           — locale, UTC timezone, base packages
#   3. distribute-root-ca.yaml          — homelab root CA into the trust store
#   4. install-unattended-upgrades.yaml — security updates (kernel/nvidia/
#                                         sunshine held back via host_vars)
#   5. install-alloy.yaml               — metrics + journald logs to Grafana
#   6. setup-sunshine.yaml              — Sunshine .deb + headless streaming
#   7. setup-gaming-tools.yaml          — mangohud + gaming userland tooling
#
# This closes the old ROADMAP "Anduril Alloy + distribute-root-ca rollout"
# item: those plays are OS-family-aware and now Just Work on the apt base.
#
# SCOPING: plays 1-5 target fleet groups (alloy / debian_guests / all), not
# anduril alone. For an anduril-focused onboarding run, use `-l anduril` so
# each imported play scopes to anduril (which is a member of every group it
# needs). Per the unrestricted-safety rule, take the SAFETY PREVIEW without
# `-l` first (`--check --diff`) and confirm every other host shows changed=0,
# then apply with `-l anduril`:
#
#   # from ansible/
#   ansible-playbook playbooks/site-anduril.yaml --check --diff      # preview, all hosts
#   ansible-playbook playbooks/site-anduril.yaml -l anduril --diff   # apply, anduril only
#
# anduril is off most of the time and shares earendil's RAM with eregion
# (CT 142) until the RAM upgrade — stop eregion before booting anduril.
#
# Idempotent — safe to re-run.

- import_playbook: setup-pseudo-user.yaml
- import_playbook: setup-debian-base.yaml
- import_playbook: distribute-root-ca.yaml
- import_playbook: install-unattended-upgrades.yaml
- import_playbook: install-alloy.yaml
- import_playbook: setup-sunshine.yaml
- import_playbook: setup-gaming-tools.yaml
