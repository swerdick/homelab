---
# Entry point for configuring anduril — now CT 117, the amdgpu-sharing gaming
# LXC (was a GPU-passthrough VM; replatformed 2026-06). See
# terraform/proxmox/descriptions/anduril.md and [[project-anduril-lxc-spike]].
#
# Host-side prep (device passthrough, games dataset, fbcon/hid-steam) lives in
# setup-anduril-lxc.yaml under site-earendil.yaml. This composes the in-guest
# config.
#
# Dropped vs the VM era: setup-qemu-guest-agent (no qemu in an LXC),
# setup-sunshine (NVIDIA/Kubuntu — replaced by setup-anduril-session, which is
# Steam-in-KWin; Sunshine/Moonlight is a later add), setup-game-storage (games
# is a bind-mounted ZFS dataset now, not a raw disk to format), setup-gaming-tools
# (its MangoHud source build was NVIDIA-NVML-specific).
#
# Usage:
#   ansible-playbook playbooks/site-anduril.yaml --check --diff
#   ansible-playbook playbooks/site-anduril.yaml

- import_playbook: setup-pseudo-user.yaml
- import_playbook: setup-debian-base.yaml
- import_playbook: distribute-root-ca.yaml
- import_playbook: install-unattended-upgrades.yaml
- import_playbook: install-alloy.yaml
- import_playbook: setup-anduril-session.yaml
