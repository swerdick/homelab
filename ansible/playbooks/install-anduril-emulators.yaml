---
# Native emulators for the anduril gaming LXC (CT 117). Companion to
# setup-anduril-session.yaml (the KWin/Steam-Big-Picture TV session) and
# setup-anduril-xrdp.yaml (the mouse-capable admin desktop where emulators get
# wired into Steam as non-Steam shortcuts). Lives in site-anduril.yaml.
#
# Why native (apt/.deb), not flatpak/EmuDeck/RetroDeck: this box is apt-pure and
# the fleet avoids flatpak/snap (bubblewrap inside a *privileged* LXC is the
# historically-flaky combo, and flatpak/AppImage self-mount needs a `fuse=1`
# feature the CT doesn't carry — features are nesting+keyctl only, see
# setup-anduril-lxc.yaml). Native emulators use the system Mesa/RADV (the shared
# AMD 9070 XT) directly and read /bulk/games with no sandbox override.
#
# Library lives on the bulk pool (bind-mounted /bulk/games, see anduril.tf) in the
# standardized EmuDeck layout the Steam Deck already used:
#   /bulk/games/Emulation/{roms,bios,saves,tools}
# so the ROM/BIOS/save tree survives a CT rebuild. The session user reaches it by
# joining `shares` (GID 10000); privileged CT = 1:1, so no idmap.
#
# Packaging reality (verified 2026-06-25):
#   - RetroArch, Dolphin: in apt (universe) -> apt-managed, get upgrades.
#   - PCSX2: Linux is AppImage/Flatpak only (apt is stale). We extract the
#     AppImage (no FUSE needed via --appimage-extract) -> /opt + a launcher.
#   - Eden (Switch, daily driver) + Citron (per-game fallback): AppImages,
#     extracted (no FUSE) like PCSX2. DMCA-volatile (mirrors 403/451 without
#     warning — Eden's Gitea blocks scraping and the GitHub mirror was 451 the day
#     this was written; the .deb many guides mention no longer exists — Linux is
#     AppImage-only as of v0.2.1). NOT auto-downloaded. Stage the verified build
#     ONCE onto the durable share and this play installs from there (doubles as the
#     "keep a copy of the build that works" stash). See the staging note above.
#
# STAGING (operator, one-time): drop verified installers into
#   /bulk/games/Emulation/tools/installers/
#     Eden*.AppImage      (from stable.eden-emu.dev / git.eden-emu.dev — Eden ships
#                          Linux as an AppImage, NOT .deb; amd64 build, PGO recommended)
#     pcsx2*.AppImage      (from pcsx2.net/downloads; or set pcsx2_appimage_url)
#     citron*.AppImage     (optional fallback)
# Tasks for an un-staged emulator skip with a warning, so this play is safe to run
# before staging and idempotent after (re-runs are a no-op once installed).
#
# Verify-before-bump: emulator versions move fast. Re-confirm the staged Eden
# AppImage is the right arch build (amd64/PGO for this Skylake host), and bump
# pcsx2_appimage_url from pcsx2.net if a pinned build 404s. Per the fleet rule,
# this play NEVER runs `apt autoremove`
# (it mis-flags anduril's pinned libs).
#
# NOTE: like the sibling anduril plays, authored for ansible but pending an
# end-to-end run once the CT is SSH-onboarded.

- name: Install native emulators on the anduril LXC
  hosts: anduril
  become: true
  gather_facts: true

  vars:
    session_user: pseudo
    emu_root: /bulk/games/Emulation
    installers_dir: /bulk/games/Emulation/tools/installers
    # PCSX2 ships rolling AppImage builds (e.g. v2.7.351, May 2026) whose URLs
    # churn fast — a pinned link 404s within weeks. Default: stage it like the
    # others (drop pcsx2*.AppImage in installers/). To opt into auto-fetch instead,
    # set this to a current AppImage URL. We pin the latest STABLE GitHub release
    # (nightlies churn/404 within weeks; stable tags are durable -- verified
    # 2026-06-27). Bump when a newer stable ships; a staged pcsx2*.AppImage wins.
    pcsx2_appimage_url: "https://github.com/PCSX2/pcsx2/releases/download/v2.6.3/pcsx2-v2.6.3-linux-appimage-x64-Qt.AppImage"

  tasks:
    - name: Sanity-check that this is a Debian-family host
      ansible.builtin.assert:
        that:
          - ansible_facts.os_family == "Debian"
        fail_msg: "Expected Debian-family host, got {{ ansible_facts.os_family }}"

    # --- /bulk/games access: the session user joins `shares` (GID 10000) ---------

    - name: Ensure the shares group (GID 10000) exists
      # Matches the host/nfs/smb `shares` group. Privileged CT = 1:1 GID map, so
      # guest GID 10000 == host GID 10000; the session user then reads/writes the
      # setgid /bulk/games tree (owned root:shares) directly — no flatpak override.
      ansible.builtin.group:
        name: shares
        gid: 10000

    - name: Add the session user to shares (read/write /bulk/games)
      ansible.builtin.user:
        name: "{{ session_user }}"
        groups: shares
        append: true

    - name: Confirm the emulation library mount is present
      # /bulk/games is a CT bind-mount (anduril.tf); if it's missing the CT wasn't
      # restarted after the mount was added. Fail clearly rather than scatter
      # emulator config into a non-existent path.
      ansible.builtin.stat:
        path: "{{ emu_root }}"
      register: emu_root_stat

    - name: Assert the Emulation tree exists on the bulk mount
      ansible.builtin.assert:
        that:
          - emu_root_stat.stat.exists
          - emu_root_stat.stat.isdir
        fail_msg: >-
          {{ emu_root }} not found. Add the /bulk/games mount_point (anduril.tf),
          `just tf apply`, then `pct reboot 117` so the bind-mount appears.

    - name: Ensure the standard Emulation subdirs exist
      ansible.builtin.file:
        path: "{{ emu_root }}/{{ item }}"
        state: directory
        owner: "{{ session_user }}"
        group: shares
        mode: "2775"
      loop:
        - roms
        - bios
        - bios/switch
        - saves
        - tools
        - tools/installers

    # --- apt-native emulators: RetroArch (multi-system) + Dolphin (GC/Wii) -------

    - name: Install apt-native emulators
      # RetroArch covers the bulk of retro systems (NES->SNES->GB/GBA->Genesis->
      # PS1->N64->DS) via its cores; Dolphin handles GameCube/Wii (.rvz/.iso).
      # Cores not packaged are fetched once from RetroArch's in-app Online Updater
      # (runtime; they land in the user's config dir).
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        name:
          - retroarch
          - retroarch-assets
          - dolphin-emu

    # The BIOS/firmware/asset files must live DIRECTLY in {{ emu_root }}/bios (the
    # system_directory set below). A "BIOS pack" zip that carries its own bios/
    # subfolder extracts to {{ emu_root }}/bios/bios, where no core finds anything
    # (PSX silently drops to HLE, PPSSPP loses its fonts -- chased 2026-06-27).
    # Flag that loudly rather than let it masquerade as missing BIOS.
    - name: Detect a double-nested BIOS pack
      ansible.builtin.stat:
        path: "{{ emu_root }}/bios/bios"
      register: bios_nested

    - name: Warn if the BIOS pack is nested one level too deep
      ansible.builtin.debug:
        msg: >-
          WARNING: {{ emu_root }}/bios/bios exists -- the BIOS pack is one level too
          deep and cores will not find their files. Flatten it: move the contents of
          {{ emu_root }}/bios/bios up into {{ emu_root }}/bios.
      when:
        - bios_nested.stat.exists
        - bios_nested.stat.isdir

    - name: Point RetroArch at the shared library (system/saves/states/roms)
      # RetroArch reads ~/.config/retroarch/retroarch.cfg. Set just the path keys
      # so BIOS + saves live on /bulk/games (survive a CT rebuild) and the file
      # browser opens at the ROM tree. create=true seeds the file if absent;
      # RetroArch fills in the rest of its defaults on first launch.
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.lineinfile:
        path: "/home/{{ session_user }}/.config/retroarch/retroarch.cfg"
        regexp: '^{{ item.key }} = '
        line: '{{ item.key }} = "{{ item.value }}"'
        create: true
        mode: "0644"
      loop:
        - { key: system_directory, value: "{{ emu_root }}/bios" }
        - { key: savefile_directory, value: "{{ emu_root }}/saves" }
        - { key: savestate_directory, value: "{{ emu_root }}/saves" }
        - { key: rgui_browser_directory, value: "{{ emu_root }}/roms" }
        # Launch fullscreen so Big Picture treats it as the focused game (routes the
        # Steam Input pad) instead of a floating window. video_windowed_fullscreen is
        # already true, so this is BORDERLESS fullscreen — a compositor op, no DRM
        # modeset (which would risk the never-hot-modeset GPU wedge on this box).
        - { key: video_fullscreen, value: "true" }
        # The apt retroarch-assets package installs the full menu icon/glyph set
        # (ozone/xmb/...) here; RetroArch defaults assets_directory to an empty
        # ~/.config path, which renders menu icons + button glyphs as black squares.
        - { key: assets_directory, value: "/usr/share/libretro/assets" }
        # Bring up the RetroArch menu with Start+Select (a combo, so it needs no
        # hotkey-enable button) — the only controller way out of a running game, for
        # Quit / Close Content / save states. The Steam overlay is unreliable for
        # native non-Steam games on Wayland, so this is the dependable exit.
        # 4 = Start+Select in RetroArch's input_combo_type enum.
        - { key: input_menu_toggle_gamepad_combo, value: "4" }
      loop_control:
        label: "{{ item.key }}"

    - name: Set RetroArch video output (crisp integer scale, no sharpen shader)
      # Retro cores render at tiny native res; on the 4K panel scale them with integer
      # multiples (pixel-perfect, correct aspect via pillarbox) and NEAREST
      # (video_smooth=false), not bilinear mush, and keep any auto-loaded shader off so
      # no sharpen pass can ring. These are display prefs, not artifact-critical (retro
      # cores don't FSR) -- flip video_scale_integer to "false" to fill the screen.
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.lineinfile:
        path: "/home/{{ session_user }}/.config/retroarch/retroarch.cfg"
        regexp: '^{{ item.key }} = '
        line: '{{ item.key }} = "{{ item.value }}"'
        create: true
        mode: "0644"
      loop:
        - { key: video_smooth, value: "false" }
        - { key: video_scale_integer, value: "true" }
        - { key: video_shader_enable, value: "false" }
      loop_control:
        label: "{{ item.key }}"

    # --- All emulators: force XWayland so Steam Input actually reaches them --------
    # ROOT CAUSE of "controller detected but unresponsive in emulators" (chased
    # 2026-06-26): they render on NATIVE WAYLAND, where Steam's overlay + Steam-Input
    # hook can't attach -> Steam never switches to gamepad mode and writes 0 to the
    # virtual pad the emulator reads (verified: SC2 streamed 180 KB on hidraw while the
    # pad got 0 bytes). Native Steam games are unaffected — Steam itself runs on
    # XWayland. Fix: blank WAYLAND_DISPLAY (+ QT_QPA_PLATFORM=xcb for the Qt UIs) so the
    # emulator runs under XWayland, where the hook attaches. XWayland is durable — only
    # the X11 *session* is deprecated, not the X11-app compat layer.
    - name: Install XWayland-forcing wrappers for the apt emulators (RetroArch, Dolphin)
      ansible.builtin.copy:
        dest: "/usr/local/bin/{{ item }}"
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/bin/sh
          exec env WAYLAND_DISPLAY= QT_QPA_PLATFORM=xcb /usr/bin/{{ item }} "$@"
      loop:
        - retroarch
        - dolphin-emu

    - name: Ensure /usr/local/share/applications exists (for the .desktop overrides)
      ansible.builtin.file:
        path: /usr/local/share/applications
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Override the apt-emulator .desktop entries to use the XWayland wrapper
      # /usr/local/share/applications takes precedence over the apt /usr/share copy, so
      # a Steam shortcut added fresh from the menu picks up the wrapper (a clean
      # single-path Exec that Steam parses cleanly). An ALREADY-added shortcut instead
      # needs `WAYLAND_DISPLAY= %command%` in its Steam Launch Options.
      ansible.builtin.copy:
        dest: "/usr/local/share/applications/{{ item.id }}.desktop"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Desktop Entry]
          Type=Application
          Name={{ item.name }}
          Exec=/usr/local/bin/{{ item.id }} %f
          Icon={{ item.id }}
          Terminal=false
          Categories=Game;Emulator;
          StartupWMClass={{ item.id }}
      loop:
        - { id: retroarch, name: RetroArch }
        - { id: dolphin-emu, name: "Dolphin Emulator" }
      loop_control:
        label: "{{ item.id }}"

    - name: De-classify Sunshine's virtual absolute-pointer as a joystick
      # Sunshine's "Mouse passthrough (absolute)" exposes ABS axes, so the kernel/udev
      # tag it a joystick (js0); RetroArch's udev joypad driver then squats port 0 with
      # it and bumps the real controller up a slot. Clear ID_INPUT_JOYSTICK so joypad
      # consumers skip it; its mouse/pointer (Moonlight abs input) is unaffected.
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/99-anduril-emulator-input.rules
        owner: root
        group: root
        mode: "0644"
        content: |
          SUBSYSTEM=="input", ATTRS{name}=="Mouse passthrough (absolute)", ENV{ID_INPUT_JOYSTICK}="0"

    - name: Ensure ROM + mod tools are present (unzip, chdman, rsync)
      # unzip: ansible unarchive needs it for .zip. mame-tools: provides `chdman`,
      # used to convert CD-based PS2/PSX rips (raw bin/cue, which PCSX2 cannot
      # ingest) into .chd -- a single compressed image PCSX2/RetroArch load cleanly.
      # rsync: mirrors the staged TOTK mod set into Eden's load dir (task below).
      ansible.builtin.apt:
        name:
          - unzip
          - mame-tools
          - rsync
        state: present

    - name: Ensure the RetroArch autoconfig dir exists
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.file:
        path: "/home/{{ session_user }}/.config/retroarch/autoconfig"
        state: directory
        mode: "0755"

    - name: Install RetroArch joypad autoconfig profiles
      # The apt RetroArch ships NO controller profiles, so a pad shows up as
      # "connected but not setup" (detected, unmapped). This is the same set the
      # in-app "Update Controller Profiles" fetches; udev/ includes "Microsoft X-Box
      # 360 pad" (045e:028e, display "Xbox 360 Controller") — exactly what Steam
      # Input presents the controller as — so it auto-binds. `creates` = idempotent.
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.unarchive:
        src: https://buildbot.libretro.com/assets/frontend/autoconfig.zip
        dest: "/home/{{ session_user }}/.config/retroarch/autoconfig"
        remote_src: true
        creates: "/home/{{ session_user }}/.config/retroarch/autoconfig/udev"

    - name: Ensure the RetroArch cores dir exists
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.file:
        path: "/home/{{ session_user }}/.config/retroarch/cores"
        state: directory
        mode: "0755"

    - name: Install a curated RetroArch core set (libretro buildbot)
      # The apt RetroArch ships NO cores, so it can't launch anything ("No Core" in
      # the menu). Pull a default set covering the ROM library from the libretro
      # buildbot — the same source as the in-app Online Updater -> Core Downloader.
      # Add more cores later in-app. `creates` keeps each download idempotent.
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.unarchive:
        src: "https://buildbot.libretro.com/nightly/linux/x86_64/latest/{{ item }}_libretro.so.zip"
        dest: "/home/{{ session_user }}/.config/retroarch/cores"
        remote_src: true
        creates: "/home/{{ session_user }}/.config/retroarch/cores/{{ item }}_libretro.so"
      loop:
        - nestopia            # NES
        - snes9x              # SNES
        - gambatte            # Game Boy / Color
        - mgba                # Game Boy Advance
        - mupen64plus_next    # Nintendo 64
        - melonds             # Nintendo DS
        - citra               # Nintendo 3DS
        - pcsx_rearmed        # PlayStation 1
        - ppsspp              # PSP
        - genesis_plus_gx     # Genesis / Mega Drive / SMS / Game Gear
        - dosbox_pure         # DOS
      loop_control:
        label: "{{ item }}"

    # --- Hardened-kernel fix: clear exec-stack flag on cores that won't load -----
    # Some libretro buildbot cores ship with PT_GNU_STACK marked executable. This
    # PVE kernel refuses to load such a shared object ("cannot enable executable
    # stack as shared object requires: Invalid argument"), so the core won't open
    # and its whole system is dead -- melonds/NDS hit this 2026-06-27. Clearing the
    # flag (what `execstack -c` does, but execstack isn't packaged on Trixie) lets
    # it load. Re-downloading a core reintroduces the flag, so this re-clears each
    # run; the helper reports 'changed' only when it actually flips a bit.
    - name: Install the exec-stack clearing helper
      ansible.builtin.copy:
        dest: /usr/local/bin/clear-execstack
        owner: root
        group: root
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          # Clear the PT_GNU_STACK executable bit on an ELF shared object (no extra
          # packages; equivalent to `execstack -c`). Idempotent: prints 'cleared'
          # only when it flips the X bit, else already-clear / missing / no-gnu-stack.
          import struct, sys, os
          p = sys.argv[1]
          if not os.path.exists(p):
              print("missing"); sys.exit(0)
          d = bytearray(open(p, "rb").read())
          if d[:4] != b"\x7fELF":
              print("not-elf"); sys.exit(0)
          is64 = d[4] == 2
          en = "<" if d[5] == 1 else ">"
          phoff = struct.unpack_from(en + ("Q" if is64 else "I"), d, 0x20 if is64 else 0x1c)[0]
          phesz, phnum = struct.unpack_from(en + "HH", d, 0x36 if is64 else 0x2a)
          foff = 4 if is64 else 24
          hit = cleared = False
          for i in range(phnum):
              o = phoff + i * phesz
              if struct.unpack_from(en + "I", d, o)[0] == 0x6474e551:
                  hit = True
                  fo = o + foff
                  fl = struct.unpack_from(en + "I", d, fo)[0]
                  if fl & 1:
                      struct.pack_into(en + "I", d, fo, fl & ~1)
                      cleared = True
          print("cleared" if cleared else "already-clear" if hit else "no-gnu-stack")
          if cleared:
              open(p, "wb").write(d)

    - name: Clear exec-stack flag on cores the hardened kernel rejects
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.command:
        cmd: >-
          /usr/local/bin/clear-execstack
          /home/{{ session_user }}/.config/retroarch/cores/{{ item }}_libretro.so
      register: execstack_fix
      changed_when: execstack_fix.stdout == "cleared"
      loop:
        - melonds            # NDS -- ships with an executable stack this kernel denies
      loop_control:
        label: "{{ item }}"

    # --- Dolphin (GameCube/Wii): point at the shared ROM tree -------------------

    - name: Ensure Dolphin's config dir exists
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.file:
        path: "/home/{{ session_user }}/.config/dolphin-emu"
        state: directory
        mode: "0755"

    - name: Point Dolphin at the shared ROM tree (recursive scan)
      # Dolphin reads game folders from Dolphin.ini [General]: ISOPaths = <count>,
      # ISOPath0..N = dirs, RecursiveISOPaths = recurse. Pre-seeding these makes
      # Dolphin list the GC/Wii titles (.rvz/.iso) in the flat roms/ heap on first
      # launch — no in-app "Add folder" step. Dolphin uses spaced `Key = Value`.
      become: true
      become_user: "{{ session_user }}"
      community.general.ini_file:
        path: "/home/{{ session_user }}/.config/dolphin-emu/Dolphin.ini"
        section: General
        option: "{{ item.option }}"
        value: "{{ item.value }}"
        mode: "0644"
      loop:
        - { option: ISOPaths, value: "1" }
        - { option: ISOPath0, value: "{{ emu_root }}/roms" }
        - { option: RecursiveISOPaths, value: "True" }
      loop_control:
        label: "{{ item.option }}"

    - name: Set Dolphin graphics output (4K internal res, no post shader)
      # Dolphin reads GFX.ini (separate from Dolphin.ini). InternalResolution is a
      # multiple of GC/Wii native: 6 ~= 4K (3840-wide), GPU-cheap on the 9070XT and
      # res-independent on the i7-6700K. Empty PostProcessingShader = no sharpen pass
      # that could ring. Dolphin uses spaced `Key = Value` and rewrites GFX.ini on
      # exit but preserves these keys once set.
      become: true
      become_user: "{{ session_user }}"
      community.general.ini_file:
        path: "/home/{{ session_user }}/.config/dolphin-emu/GFX.ini"
        section: "{{ item.section }}"
        option: "{{ item.option }}"
        value: "{{ item.value }}"
        mode: "0644"
      loop:
        - { section: Settings, option: InternalResolution, value: "6" }
        - { section: Enhancements, option: PostProcessingShader, value: "" }
      loop_control:
        label: "{{ item.section }}/{{ item.option }}"

    # --- Eden (Switch): add the shared ROM tree as a game directory -------------

    - name: Point Eden at the shared ROM tree (game directory)
      # Eden (Yuzu fork) stores game dirs in qt-config.ini [UI] as
      # Paths\gamedirs\<n>\path, gated by Paths\gamedirs\size. A fresh config has 3
      # virtual entries (SDMC/UserNAND/SysNAND); append ours as #4 and bump size.
      # no_extra_spaces matches Qt's `key=value` (spaces wouldn't parse). Eden
      # rewrites this file on exit but preserves the entry once read. Fragile by
      # nature (live-rewritten Qt config) — if it doesn't take, add the folder via
      # Eden's UI (+ button); it can't corrupt the emulator, only the game list.
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.ini_file:
        path: "/home/{{ session_user }}/.config/eden/qt-config.ini"
        section: UI
        option: "{{ item.option }}"
        value: "{{ item.value }}"
        no_extra_spaces: true
        mode: "0644"
      loop:
        - { option: 'Paths\gamedirs\size', value: "4" }
        - { option: 'Paths\gamedirs\4\path', value: "{{ emu_root }}/roms" }
        - { option: 'Paths\gamedirs\4\deep_scan', value: "true" }
        - { option: 'Paths\gamedirs\4\expanded', value: "true" }
      loop_control:
        label: "{{ item.option }}"

    - name: Pin Eden's scaling filter to Bilinear (never FSR -- the TOTK checkerboard)
      # Eden's [Renderer] scaling_filter picks how its internal-res frame scales to the
      # 4K window: 5 = FSR, whose sharpening rings (the checkerboard seen in TOTK). Pin
      # 1 = Bilinear. yuzu-family stores a `<key>\default` companion; when true it
      # ignores the value, so set it false to force ours. Belt-and-suspenders to the
      # VisualFixes pchtxt that disables in-game FSR; use_disk_shader_cache trims
      # first-run shader-compile hitching. Eden live-rewrites qt-config.ini but keeps
      # these once set.
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.ini_file:
        path: "/home/{{ session_user }}/.config/eden/qt-config.ini"
        section: Renderer
        option: "{{ item.option }}"
        value: "{{ item.value }}"
        no_extra_spaces: true
        mode: "0644"
      loop:
        - { option: scaling_filter, value: "1" }
        - { option: 'scaling_filter\default', value: "false" }
        - { option: use_disk_shader_cache, value: "true" }
        - { option: 'use_disk_shader_cache\default', value: "false" }
      loop_control:
        label: "{{ item.option }}"

    # --- PCSX2 (PS2): AppImage, extracted so it runs without a FUSE feature ------

    - name: Look for a staged PCSX2 AppImage (overrides the pinned URL)
      ansible.builtin.find:
        paths: "{{ installers_dir }}"
        patterns: "pcsx2*.AppImage"
      register: pcsx2_staged

    - name: Fetch the pinned PCSX2 AppImage (when none staged and a URL is set)
      ansible.builtin.get_url:
        url: "{{ pcsx2_appimage_url }}"
        dest: "{{ installers_dir }}/pcsx2.AppImage"
        mode: "0755"
      when:
        - pcsx2_staged.files | length == 0
        - pcsx2_appimage_url | length > 0
      register: pcsx2_fetch

    - name: Resolve the PCSX2 AppImage path
      ansible.builtin.set_fact:
        pcsx2_appimage: >-
          {{ (pcsx2_staged.files | map(attribute='path') | first)
             if pcsx2_staged.files | length > 0
             else (installers_dir + '/pcsx2.AppImage'
                   if pcsx2_fetch is defined and not pcsx2_fetch.skipped | default(false)
                   else '') }}

    - name: Install PCSX2 (extract AppImage -> /opt, no FUSE needed)
      # --appimage-extract self-unpacks via the AppImage's bundled runtime, so it
      # works without /dev/fuse (the CT has no fuse=1 feature). We unpack to a
      # versionless /opt path and expose AppRun on PATH. Guarded on the binary
      # being absent so re-runs are a no-op.
      when: pcsx2_appimage | length > 0
      block:
        - name: Stat the PCSX2 install
          ansible.builtin.stat:
            path: /opt/pcsx2/AppRun
          register: pcsx2_bin

        - name: Extract PCSX2 (AppImage -> /opt/pcsx2, no FUSE)
          when: not pcsx2_bin.stat.exists
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              rm -rf /opt/pcsx2 /tmp/pcsx2-extract
              mkdir -p /tmp/pcsx2-extract && cd /tmp/pcsx2-extract
              cp "{{ pcsx2_appimage }}" ./pcsx2.AppImage && chmod +x ./pcsx2.AppImage
              ./pcsx2.AppImage --appimage-extract >/dev/null
              # readlink -f: some AppImages extract squashfs-root as a symlink to
              # AppDir/ (move the real dir); harmless for plain-dir extracts.
              mv "$(readlink -f squashfs-root)" /opt/pcsx2
              rm -rf /tmp/pcsx2-extract
          changed_when: true

        - name: Install the PCSX2 launcher
          # Wrapper, not symlink — AppRun resolves its libs from dirname($0); a
          # symlink in /usr/local/bin would break that. exec by real path.
          ansible.builtin.copy:
            dest: /usr/local/bin/pcsx2
            mode: "0755"
            content: |
              #!/bin/sh
              # XWayland: Steam's overlay + Steam-Input hook don't attach to native
              # Wayland clients -> no controller in non-Steam shortcuts (see the
              # apt-emulator wrapper note above).
              exec env WAYLAND_DISPLAY= QT_QPA_PLATFORM=xcb /opt/pcsx2/AppRun "$@"

        - name: Find the PCSX2 app icon
          ansible.builtin.find:
            paths: /opt/pcsx2
            patterns: ['*.svg', '*.png']
          register: pcsx2_icon

        - name: Install a PCSX2 .desktop entry (XFCE menu + Steam add-game list)
          ansible.builtin.copy:
            dest: /usr/share/applications/pcsx2.desktop
            mode: "0644"
            content: |
              [Desktop Entry]
              Type=Application
              Name=PCSX2
              GenericName=PlayStation 2 Emulator
              Exec=/usr/local/bin/pcsx2 %f
              Icon={{ (pcsx2_icon.files | map(attribute='path') | first) | default('applications-games', true) }}
              Terminal=false
              Categories=Game;Emulator;
              StartupWMClass=pcsx2

        - name: Point PCSX2 at the shared BIOS (skip the first-run wizard on rebuild)
          # PCSX2 keeps its own BIOS folder (XDG ~/.config/PCSX2), separate from
          # RetroArch's system dir. Pin it at the shared pack + pre-select the US PS2
          # BIOS so a rebuilt CT boots PS2 without the setup wizard. PCSX2 live-rewrites
          # this ini but preserves these keys once set.
          become: true
          become_user: "{{ session_user }}"
          ansible.builtin.ini_file:
            path: "/home/{{ session_user }}/.config/PCSX2/inis/PCSX2.ini"
            section: "{{ item.section }}"
            option: "{{ item.option }}"
            value: "{{ item.value }}"
            mode: "0644"
          loop:
            - { section: Folders, option: Bios, value: "{{ emu_root }}/bios" }
            - { section: Filenames, option: BIOS, value: "scph39001.bin" }
          loop_control:
            label: "{{ item.section }}/{{ item.option }}"

        - name: Set PCSX2 graphics output (4K upscale, no TV shader)
          # PCSX2 keeps GS settings in PCSX2.ini [EmuCore/GS]. upscale_multiplier is a
          # multiple of PS2 native: 6 ~= 4K, GPU-cheap on the 9070XT. TVShader=0 keeps
          # the CRT/sharpen shader off so nothing rings. PCSX2 live-rewrites the ini but
          # preserves these keys once set.
          become: true
          become_user: "{{ session_user }}"
          ansible.builtin.ini_file:
            path: "/home/{{ session_user }}/.config/PCSX2/inis/PCSX2.ini"
            section: EmuCore/GS
            option: "{{ item.option }}"
            value: "{{ item.value }}"
            mode: "0644"
          loop:
            - { option: upscale_multiplier, value: "6" }
            - { option: TVShader, value: "0" }
          loop_control:
            label: "{{ item.option }}"

        - name: Seed the PCSX2 controller binding (SDL pad -> DualShock2)
          # Captured from PCSX2's "Automatic Mapping" of the Steam-Input pad (a generic
          # SDL Xbox layout) so the controller survives a rootfs rebuild without
          # re-mapping. CAVEAT: bound to device index SDL-0; if the pad enumerates
          # elsewhere on a rebuild, re-run Automatic Mapping in PCSX2 -> Controllers.
          become: true
          become_user: "{{ session_user }}"
          ansible.builtin.ini_file:
            path: "/home/{{ session_user }}/.config/PCSX2/inis/PCSX2.ini"
            section: Pad1
            option: "{{ item.option }}"
            value: "{{ item.value }}"
            mode: "0644"
          loop:
            - { option: Type, value: DualShock2 }
            - { option: AxisScale, value: "1.33" }
            - { option: Up, value: SDL-0/DPadUp }
            - { option: Right, value: SDL-0/DPadRight }
            - { option: Down, value: SDL-0/DPadDown }
            - { option: Left, value: SDL-0/DPadLeft }
            - { option: Triangle, value: SDL-0/FaceNorth }
            - { option: Circle, value: SDL-0/FaceEast }
            - { option: Cross, value: SDL-0/FaceSouth }
            - { option: Square, value: SDL-0/FaceWest }
            - { option: Select, value: SDL-0/Back }
            - { option: Start, value: SDL-0/Start }
            - { option: L1, value: SDL-0/LeftShoulder }
            - { option: L2, value: "SDL-0/+LeftTrigger" }
            - { option: R1, value: SDL-0/RightShoulder }
            - { option: R2, value: "SDL-0/+RightTrigger" }
            - { option: L3, value: SDL-0/LeftStick }
            - { option: R3, value: SDL-0/RightStick }
            - { option: LUp, value: "SDL-0/-LeftY" }
            - { option: LRight, value: "SDL-0/+LeftX" }
            - { option: LDown, value: "SDL-0/+LeftY" }
            - { option: LLeft, value: "SDL-0/-LeftX" }
            - { option: RUp, value: "SDL-0/-RightY" }
            - { option: RRight, value: "SDL-0/+RightX" }
            - { option: RDown, value: "SDL-0/+RightY" }
            - { option: RLeft, value: "SDL-0/-RightX" }
            - { option: Analog, value: SDL-0/Guide }
            - { option: LargeMotor, value: SDL-0/LargeMotor }
            - { option: SmallMotor, value: SDL-0/SmallMotor }
          loop_control:
            label: "{{ item.option }}"

    # --- Eden (Switch, daily) + Citron (fallback): staged-only, DMCA-volatile ----

    - name: Look for a staged Eden AppImage
      ansible.builtin.find:
        paths: "{{ installers_dir }}"
        patterns: "[Ee]den*.AppImage"
      register: eden_staged

    - name: Warn if Eden is not staged
      ansible.builtin.debug:
        msg: >-
          No Eden*.AppImage in {{ installers_dir }}. Eden ships Linux as an AppImage
          (not .deb) — grab the amd64 build (PGO recommended) from
          stable.eden-emu.dev / git.eden-emu.dev, drop it there, and re-run.
          Skipping the Switch emulator for now.
      when: eden_staged.files | length == 0

    - name: Install Eden (extract AppImage -> /opt, no FUSE) + link keys
      # Eden's Linux build is an AppImage; --appimage-extract self-unpacks via the
      # bundled runtime, so it runs without /dev/fuse (the CT has no fuse feature).
      # Newest staged file wins. Guarded on the launcher so re-runs are a no-op.
      when: eden_staged.files | length > 0
      block:
        - name: Stat the Eden install
          # Guard on the real binary, not /usr/local/bin/eden — a prior botched run
          # can leave that as a dangling symlink, which stat would report as
          # exists=true and wrongly skip the repair.
          ansible.builtin.stat:
            path: /opt/eden/AppRun
          register: eden_bin

        - name: Extract Eden (AppImage -> /opt/eden, no FUSE)
          when: not eden_bin.stat.exists
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              src="{{ (eden_staged.files | sort(attribute='mtime') | last).path }}"
              rm -rf /opt/eden /tmp/eden-extract
              mkdir -p /tmp/eden-extract && cd /tmp/eden-extract
              cp "$src" ./eden.AppImage && chmod +x ./eden.AppImage
              ./eden.AppImage --appimage-extract >/dev/null
              # Eden's AppImage (sharun) extracts to AppDir/ plus a squashfs-root
              # symlink -> ./AppDir; readlink -f moves the real dir (and still works
              # for AppImages that extract squashfs-root as a plain dir).
              mv "$(readlink -f squashfs-root)" /opt/eden
              rm -rf /tmp/eden-extract
          changed_when: true

        - name: Install the Eden launcher
          # NOT a symlink: this sharun AppRun derives its libs from dirname($0)
          # (APPDIR=$(cd "${0%/*}"...)), so a /usr/local/bin/eden symlink makes it
          # hunt for /usr/local/bin/bin/eden. A wrapper execs AppRun by its real path
          # so $0 — and APPDIR — resolve to /opt/eden. Idempotent (copy).
          ansible.builtin.copy:
            dest: /usr/local/bin/eden
            mode: "0755"
            content: |
              #!/bin/sh
              # XWayland (see the apt-emulator wrapper note) — keeps Steam Input working.
              exec env WAYLAND_DISPLAY= QT_QPA_PLATFORM=xcb /opt/eden/AppRun "$@"

        - name: Find the Eden app icon
          ansible.builtin.find:
            paths: /opt/eden
            patterns: ['*.svg', '*.png']
          register: eden_icon

        - name: Install an Eden .desktop entry (XFCE menu + Steam add-game list)
          # AppImage-extracted apps have no apt-provided .desktop, so they don't show
          # up in the menu or Steam's "Add a Non-Steam Game" list the way the apt
          # RetroArch/Dolphin do. Point Exec at the wrapper; icon from the AppDir.
          ansible.builtin.copy:
            dest: /usr/share/applications/eden.desktop
            mode: "0644"
            content: |
              [Desktop Entry]
              Type=Application
              Name=Eden
              GenericName=Nintendo Switch Emulator
              Exec=/usr/local/bin/eden %f
              Icon={{ (eden_icon.files | map(attribute='path') | first) | default('applications-games', true) }}
              Terminal=false
              Categories=Game;Emulator;
              StartupWMClass=eden

        - name: Link the dumped Switch keys into Eden's data dir
          # Eden reads keys from ~/.local/share/eden/keys regardless of packaging.
          # Symlink the canonical copy on /bulk/games so a rootfs rebuild doesn't
          # lose them. Firmware is imported in-app (Eden -> Install Firmware) from
          # {{ emu_root }}/bios/switch. Verify-before: confirm this data-dir path
          # against the installed Eden version if keys aren't detected.
          become: true
          become_user: "{{ session_user }}"
          block:
            - name: Ensure the Eden keys dir exists
              ansible.builtin.file:
                path: "/home/{{ session_user }}/.local/share/eden/keys"
                state: directory
                mode: "0755"
            - name: Link prod.keys into Eden
              ansible.builtin.file:
                src: "{{ emu_root }}/bios/switch/prod.keys"
                dest: "/home/{{ session_user }}/.local/share/eden/keys/prod.keys"
                state: link
                force: true

        - name: Seed the Eden controller binding (Player 1, from captured map)
          # Re-applies the SDL->Pro Controller map captured from a working Eden setup
          # (files/anduril/eden-controls-player1.ini) so the pad works after a rebuild
          # without re-mapping. guid 03000000de28... is the stable Steam virtual
          # controller. Eden live-rewrites qt-config.ini but preserves these once set.
          # CAVEAT: if the pad enumerates with a different guid post-rebuild, just
          # re-run Eden -> Controls -> auto-map and re-capture the file.
          become: true
          become_user: "{{ session_user }}"
          ansible.builtin.ini_file:
            path: "/home/{{ session_user }}/.config/eden/qt-config.ini"
            section: Controls
            option: "{{ item.split('=', 1)[0] }}"
            value: "{{ item.split('=', 1)[1] }}"
            no_extra_spaces: true
            mode: "0644"
          loop: "{{ lookup('file', playbook_dir + '/files/anduril/eden-controls-player1.ini').splitlines() | select('match', '^player_0_') | list }}"
          loop_control:
            label: "{{ item.split('=', 1)[0] }}"

    - name: Look for a staged Citron AppImage (optional fallback)
      ansible.builtin.find:
        paths: "{{ installers_dir }}"
        patterns: "citron*.AppImage"
      register: citron_staged

    - name: Install Citron (extract AppImage -> /opt, no FUSE needed)
      when: citron_staged.files | length > 0
      block:
        - name: Stat the Citron install
          ansible.builtin.stat:
            path: /opt/citron/AppRun
          register: citron_bin

        - name: Extract Citron (AppImage -> /opt/citron, no FUSE)
          when: not citron_bin.stat.exists
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              src="{{ (citron_staged.files | sort(attribute='mtime') | last).path }}"
              rm -rf /opt/citron /tmp/citron-extract
              mkdir -p /tmp/citron-extract && cd /tmp/citron-extract
              cp "$src" ./citron.AppImage && chmod +x ./citron.AppImage
              ./citron.AppImage --appimage-extract >/dev/null
              # readlink -f: some AppImages extract squashfs-root as a symlink to
              # AppDir/ (move the real dir); harmless for plain-dir extracts.
              mv "$(readlink -f squashfs-root)" /opt/citron
              rm -rf /tmp/citron-extract
          changed_when: true

        - name: Install the Citron launcher
          # Wrapper, not symlink — AppRun resolves its libs from dirname($0).
          ansible.builtin.copy:
            dest: /usr/local/bin/citron
            mode: "0755"
            content: |
              #!/bin/sh
              # XWayland (see the apt-emulator wrapper note) — keeps Steam Input working.
              exec env WAYLAND_DISPLAY= QT_QPA_PLATFORM=xcb /opt/citron/AppRun "$@"

        - name: Find the Citron app icon
          ansible.builtin.find:
            paths: /opt/citron
            patterns: ['*.svg', '*.png']
          register: citron_icon

        - name: Install a Citron .desktop entry (XFCE menu + Steam add-game list)
          ansible.builtin.copy:
            dest: /usr/share/applications/citron.desktop
            mode: "0644"
            content: |
              [Desktop Entry]
              Type=Application
              Name=Citron
              GenericName=Nintendo Switch Emulator
              Exec=/usr/local/bin/citron %f
              Icon={{ (citron_icon.files | map(attribute='path') | first) | default('applications-games', true) }}
              Terminal=false
              Categories=Game;Emulator;
              StartupWMClass=citron

    # --- ROM library skeleton + Steam ROM Manager --------------------------------
    - name: Lay down the per-system ROM library skeleton
      # SRM, RetroArch, and the standalone emulators all expect ROMs grouped by SYSTEM
      # (EmuDeck shortnames), ONE FILE PER GAME -- not a folder per ROM. Saves/states
      # live centrally in each emulator's config dir, never beside the ROM. Drop ROMs
      # into the matching folder; flatten any existing per-game folders into these.
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.file:
        path: "{{ emu_root }}/roms/{{ item }}"
        state: directory
        group: shares
        mode: "0775"
      loop: [nes, snes, n64, gb, gbc, gba, nds, n3ds, genesis, gamegear, mastersystem, psx, ps2, psp, dos, gc, wii, switch]

    - name: Stat the Steam ROM Manager install
      ansible.builtin.stat:
        path: /opt/srm/AppRun
      register: srm_bin

    - name: Install Steam ROM Manager (AppImage -> /opt, no FUSE)
      # SRM bulk-adds one non-Steam shortcut per ROM (emulator as target, ROM as arg) +
      # box art from SteamGridDB. No apt repo; the .deb's postinst installs an AppArmor
      # profile, which a container CANNOT manage (apparmor_parser: Access denied) -> dpkg
      # fails -- so extract-and-run the AppImage like the other emulators (no FUSE, no
      # apparmor). VERIFY-BEFORE-BUMP: latest tag at
      # github.com/SteamGridDB/steam-rom-manager/releases.
      when: not srm_bin.stat.exists
      block:
        - name: Download the Steam ROM Manager AppImage
          ansible.builtin.get_url:
            url: "https://github.com/SteamGridDB/steam-rom-manager/releases/download/v2.5.34/Steam-ROM-Manager-2.5.34.AppImage"
            dest: /tmp/srm.AppImage
            mode: "0755"
        - name: Extract Steam ROM Manager (AppImage -> /opt/srm, no FUSE)
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              rm -rf /opt/srm /tmp/srm-extract
              mkdir -p /tmp/srm-extract && cd /tmp/srm-extract
              /tmp/srm.AppImage --appimage-extract >/dev/null
              mv "$(readlink -f squashfs-root)" /opt/srm
              # SRM's squashfs extracts non-world-traversable; the desktop user runs
              # the wrapper, so make /opt/srm readable/traversable by all.
              chmod -R a+rX /opt/srm
              rm -rf /tmp/srm-extract /tmp/srm.AppImage
          changed_when: true

    - name: Install the Steam ROM Manager launcher
      # Electron's Chromium sandbox needs userns (constrained in a privileged LXC) ->
      # --no-sandbox. Run SRM from the xrdp/KDE desktop session (it's a GUI): configure
      # parsers once, then Generate -> Save to Steam (enable its kill/restart-Steam
      # option so it can safely write shortcuts.vdf). Parsers target /usr/bin/retroarch
      # -L <core> for RetroArch systems, and the /usr/local/bin/<emu> XWayland wrappers
      # for Dolphin/PCSX2/Eden/Citron.
      ansible.builtin.copy:
        dest: /usr/local/bin/steam-rom-manager
        mode: "0755"
        content: |
          #!/bin/sh
          # APPDIR must be set explicitly: the extracted electron-builder AppRun derives
          # its binary path from $APPDIR, which is unset when run by path (not as a
          # mounted AppImage) -> it looks for /steam-rom-manager at the root and fails.
          # --disable-gpu: the xrdp desktop has only software GL (llvmpipe); Electron's
          # GPU process otherwise crashes the X session. --no-sandbox: LXC userns.
          exec env APPDIR=/opt/srm /opt/srm/AppRun --no-sandbox --disable-gpu --disable-dev-shm-usage "$@"

    - name: Install a Steam ROM Manager .desktop entry (xrdp menu + Steam add-game list)
      ansible.builtin.copy:
        dest: /usr/share/applications/steam-rom-manager.desktop
        mode: "0644"
        content: |
          [Desktop Entry]
          Type=Application
          Name=Steam ROM Manager
          Exec=/usr/local/bin/steam-rom-manager
          Icon=applications-games
          Terminal=false
          Categories=Game;Utility;
          StartupWMClass=steam-rom-manager

    - name: Ensure the SRM userData dir exists (for the seeded config)
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.file:
        path: "/home/{{ session_user }}/.config/steam-rom-manager/userData"
        state: directory
        mode: "0755"

    - name: Seed the SRM parser config (rebuild reproducibility)
      # 12 parsers (RetroArch cores, PCSX2, Eden, ...), captured from the live
      # SRM. force=false seeds a rebuilt CT without clobbering live GUI edits
      # -- re-export the file to update. The committed copy has SRM's SteamGridDB
      # content/humor filter toggles stripped (SRM restores them as defaults on load).
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/files/anduril/srm-userConfigurations.json"
        dest: "/home/{{ session_user }}/.config/steam-rom-manager/userData/userConfigurations.json"
        force: false
        mode: "0644"

    - name: Seed the SRM app settings (account name templated from SOPS)
      # no_log: the rendered userSettings.json embeds steam_account_name
      # (host_vars/anduril/secrets.sops.yaml — identity linkage kept out of
      # the public repo, not a credential); without this, --diff would print
      # the rendered file content on any change.
      no_log: true
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.template:
        src: "{{ playbook_dir }}/files/anduril/srm-userSettings.json.j2"
        dest: "/home/{{ session_user }}/.config/steam-rom-manager/userData/userSettings.json"
        force: false
        mode: "0644"
      loop_control:
        label: "{{ item.dest }}"

    # --- TOTK (Eden) performance + visual mods ------------------------------------
    - name: Deploy the curated TOTK (Eden) mod set — mirror staging into the load dir
      # The set is staged on the bulk pool (DMCA-volatile mod hosts -> staged, not
      # auto-downloaded) and mirrored 1:1 into Eden's load dir, so the staging dir is
      # the single source of truth: add/remove a mod by changing the staging set, and
      # --delete keeps the load dir from accumulating stale mods. Current set, ported
      # from the user's proven Steam Deck 1.1.2 config: DynamicFPS 1.5.4 Main + 60fps
      # companion, Shadows-512x (perf), Disable Quality Reduction (checkerboard), Island
      # Fix, UI Blackscreen Fix, plus a VisualFixes pchtxt (disable FSR + DOF + lens
      # flare -- GPU-side, fps-safe). Deliberately NOT staged: LOD Improvement (adds draw
      # calls -> costs FPS on the CPU-bound i7-6700K) and the Sweetmini 1008p res mod
      # (Eden's own scaler renders sharper on the 4K TV). Toggle individual mods in Eden
      # -> Properties -> Add-Ons. See [[project_anduril_emulation_cpu_bound]].
      become: true
      become_user: "{{ session_user }}"
      ansible.builtin.shell:
        cmd: >
          mkdir -p "/home/{{ session_user }}/.local/share/eden/load/0100F2C0115B6000" &&
          rsync -ai --delete
          "{{ emu_root }}/tools/mods/totk/"
          "/home/{{ session_user }}/.local/share/eden/load/0100F2C0115B6000/"
      register: totk_mods_sync
      changed_when: totk_mods_sync.stdout | trim | length > 0
