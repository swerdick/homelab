---
# Fabric Minecraft server config for eregion (Paper → Fabric rebuild).
# Managed by ansible/playbooks/install-fabric-mc.yaml. See runbooks/fabric-upgrade.md.
#
# Multi-world = one systemd instance per `minecraft_instances` entry
# (fabric-server@<name>), each with its own dir/port/mods/world. Only
# `enabled: true` instances run; the rest are staged on disk but stopped.
# Worlds are run one at a time, so eregion is sized for a single instance.
#
# Artifacts (Fabric launcher, mods, datapacks) are pulled from Harbor with ORAS
# (harbor.vingilot.internal/minecraft/<name>:<tag>), pushed there once by
# scripts/publish-mc-mods.sh. Each carries `sha512` (the integrity pin —
# verified after every pull, fail-closed) and `upstream_url` (the documented
# fallback if Harbor is down: swap the oras-pull task back to get_url). OCI tags
# can't contain '+', so version tags replace '+' with '-'.
#
# Bumping a mod: update its version/tag/sha512/upstream_url here, re-run
# scripts/publish-mc-mods.sh to push the new jar, then re-run the playbook.

minecraft_mc_version: "26.2"
minecraft_fabric_loader: "0.19.3"
minecraft_fabric_installer: "1.1.1"

# oras CLI (host-side puller). Bump = edit here; playbook re-installs.
# https://github.com/oras-project/oras/releases
minecraft_oras_version: "1.3.2"
minecraft_oras_sha256: "9229ccc6d17bb282039ad4a69abb16dcb887a5bce567c075d731d9b3c7ad8eaf"

# Fabric server launcher jar. publish-mc-mods.sh fetches it from
# meta.fabricmc.net/v2/versions/loader/26.2/0.19.3/1.1.1/server/jar (which
# publishes NO checksum) and prints the sha512 it computed — paste that below.
minecraft_launch_jar:
  filename: fabric-server-mc26.2-loader0.19.3.jar
  artifact: "fabric-server-launch:26.2-loader0.19.3-installer1.1.1"
  sha512: "0c0a57be5c5786fffd697d9608ae09f8e1c025546e3daad4d5385bccfa4d2ea018fec399d57dbee5b557711b8cd8852c5423f514d1d4c71093d86f6e96711a7d"

# RCON password: reuse the existing SOPS-encrypted secret (still keyed
# `paper_rcon_password` in secrets.sops.yaml) rather than re-encrypting the
# vault during the rebuild. Rename the SOPS key at leisure later.
minecraft_rcon_password: "{{ paper_rcon_password }}"

# JVM flags. Aikar's G1GC set with two deliberate deviations so an idle server
# hands memory back to earendil (unchanged from the Paper era):
#   * removed  -XX:+AlwaysPreTouch   (force-commits + never releases the heap)
#   * added    -XX:G1PeriodicGCInterval=60000 -XX:-G1PeriodicGCInvokesConcurrent
#              (JEP 346: full GC + heap uncommit after a 60s GC-free/idle window)
# Per-instance heap is set by xms/xmx below (not baked into these flags).
minecraft_flags: >-
  -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200
  -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC
  -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8M
  -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4
  -XX:InitiatingHeapOccupancyPercent=15 -XX:G1MixedGCLiveThresholdPercent=90
  -XX:G1RSetUpdatingPauseTimePercent=5 -XX:SurvivorRatio=32
  -XX:+PerfDisableSharedMem -XX:MaxTenuringThreshold=1
  -XX:G1PeriodicGCInterval=60000 -XX:-G1PeriodicGCInvokesConcurrent

# server.properties + per-instance defaults (each instance may override).
minecraft_motd_default: "Vingilot Minecraft - eregion"
minecraft_max_players: 10
minecraft_view_distance: 10
minecraft_difficulty: "normal"
# Pause world + entity ticking after this many player-empty seconds; pairs with
# the idle-uncommit JVM flags so an empty server's heap shrinks. -1 = never.
minecraft_pause_when_empty_seconds: 60
# Fallback heap if an instance omits xms/xmx.
minecraft_xms: "1G"
minecraft_xmx: "4G"

# --- Server operators (ops.json, templated per instance) -------------------
# UUIDs from https://api.mojang.com/users/profiles/minecraft/<name>, dashed.
minecraft_ops:
  - uuid: 77eec660-11a0-4afc-bab5-a902250e639b
    name: sudoNebula
    level: 4
    bypassesPlayerLimit: false

