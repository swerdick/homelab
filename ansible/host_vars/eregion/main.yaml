---
# PaperMC server pinning (v3 / Paper-native versioning).
# Bump these to upgrade; re-run install-paper-mc.yaml; the handler restarts
# the service via mcrcon (clean save+stop). See runbooks/paper-upgrade.md.
#
# Browse versions: https://fill.papermc.io/v3/projects/paper
# Build metadata:  https://fill.papermc.io/v3/projects/paper/versions/<ver>/builds/<build>
#
# Note: Paper's v3 API uses Paper-native versioning (26.1.x) decoupled from
# the Minecraft version string. The MC-version-based 1.21.x track on the
# legacy v2 API still exists but is on a slower release cadence; v3 is
# the canonical track going forward.
paper_version: "26.1.2"
paper_build: 64

# JVM heap. Set Xms == Xmx (Aikar's recommendation: eliminates heap-resize
# pauses that read as TPS drops to players). Sized to ~75% of LXC RAM,
# leaving ~1 GiB for OS + JVM non-heap (metaspace, code cache, direct
# buffers).
paper_heap: "3G"

# Recommended JVM flags. Matches what `fill.papermc.io/v3/projects/paper/
# versions/<ver>` publishes under `version.java.flags.recommended` — these
# are Aikar's G1GC flags, originally collected at docs.papermc.io and now
# maintained as part of Paper's per-version metadata. The trailing
# `-Daikars.*` markers are for monitoring tools that detect the tuning;
# they're not in the API's list but are harmless and aid identification.
paper_flags: >-
  -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200
  -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch
  -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8M
  -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4
  -XX:InitiatingHeapOccupancyPercent=15 -XX:G1MixedGCLiveThresholdPercent=90
  -XX:G1RSetUpdatingPauseTimePercent=5 -XX:SurvivorRatio=32
  -XX:+PerfDisableSharedMem -XX:MaxTenuringThreshold=1
  -Dusing.aikars.flags=https://mcflags.emc.gs -Daikars.new.flags=true

# RCON port for `mcrcon` from thorondor. Paper always listens on 0.0.0.0
# (vanilla MC's `rcon.bind` is silently ignored); LAN-only positioning +
# the strong password in secrets.sops.yaml handles the threat model.
paper_rcon_port: 25575

# server.properties overrides — Paper auto-generates everything else.
paper_motd: "Vingilot Minecraft - eregion"
paper_max_players: 10
paper_view_distance: 10
paper_difficulty: "normal"

# paper_rcon_password lives in host_vars/eregion/secrets.sops.yaml
# (SOPS-encrypted; community.sops.sops vars plugin auto-decrypts at runtime).

# --- Server operators (ops.json) ------------------------------------------
# Paper reads ops.json at start; the playbook templates it from this list.
# `level` is the op level: 4 = full ops (default), lower values restrict
# command access. UUIDs come from Mojang's API:
#   curl -s https://api.mojang.com/users/profiles/minecraft/<name>
# Insert dashes in the 8-4-4-4-12 format that ops.json expects.
paper_ops:
  - uuid: 77eec660-11a0-4afc-bab5-a902250e639b
    name: sudoNebula
    level: 4
    bypassesPlayerLimit: false

# --- Plugins ---------------------------------------------------------------
# Server-side .jar plugins installed under /opt/minecraft/plugins/. The
# `filename` is the on-disk name (overwritten on version bump, so a bump
# just replaces the file); the URL points at the upstream artifact for
# that version. SHA512 is verified on download (Modrinth/GitHub publish
# either sha512 or sha1; we prefer sha512).
#
# Any .jar in /opt/minecraft/plugins/ not listed here gets removed on
# re-run — so dropping a plugin is just deleting the entry + replay.
paper_plugins:
  - filename: Multiverse-Core.jar
    url: https://cdn.modrinth.com/data/3wmN97b8/versions/g7LecP9j/multiverse-core-5.6.2.jar
    sha512: 364df3e244c6344b00a3da1820262c1c62720ddac911d1de4eea7a3ce0e6f219442c1c1cd51746b78551c19f7fcbc934cd177516091e4d3d21f3a6c90cf84808
  # EssentialsX intentionally absent — EssentialsX 2.21.2 (latest stable as
  # of 2026-05) NPEs on enable against Paper 26.1.2 (its provider lookup
  # tries to resolve a class that's moved/changed in Paper 26.x). The
  # 2.22.0-dev snapshot on ci.ender.zone (#1799) predates Paper 26.1.2's
  # release by 4 days, so it can't have the fix either. Re-add when a
  # Paper-26-compat EssentialsX stable lands. See ROADMAP.

# --- Worlds + datapacks ----------------------------------------------------
# `world` is the default Paper world (auto-generated on first boot; no
# datapack — vanilla terrain). `tectonic` and `terralith` are managed by
# Multiverse-Core; the playbook pre-stages their datapack files in
# /opt/minecraft/<world>/datapacks/ so that when an op runs
# `/mv create <world> normal` in-game, the datapack is already in place
# and Minecraft picks it up at world-generation time.
#
# See runbooks/paper-upgrade.md ("Adding a datapack-driven world") for
# the full procedure including the chicken-and-egg around chunk
# generation vs datapack-load order.
paper_worlds:
  - name: world  # vanilla, current survival world; datapacks intentionally empty
  - name: tectonic
    datapacks:
      - filename: Tectonic.zip
        url: https://cdn.modrinth.com/data/lWDHr9jE/versions/VfuqmXvF/tectonic-datapack-3.0.18.zip
        sha512: 3de178cc019f481d86511d66c579317a1277167685d7886707ae591f25cc910cb2d5550ef77d69c2d35b0acdb2c67b05f7ef014c45a9feda2867281227d85e81
  - name: terralith
    datapacks:
      - filename: Terralith.zip
        url: https://cdn.modrinth.com/data/8oi3bsk5/versions/xDS6ehq8/Terralith_1.21.11_v2.6.0.zip
        sha512: e583b854fd86c930be399e414a45d63a261ed7b971a97ba409b9b79e25239af397a87cb9b38eecfc0ae83253c1d9cef558107ac4037aece6eca9cfcc02a760b8
