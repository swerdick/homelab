  artifact: "terralith:2.6.3-26.2"
  sha512: "8537db76a77c9ac749c26ed213bdaac576fc92328dcba65c6e5ad20062946c9e5ff02b7ada8492812da5d8b2a8eee57817d0475e128667c3aca6b790e5ba6cdb"
  upstream_url: "https://cdn.modrinth.com/data/8oi3bsk5/versions/eihdCshF/Terralith_26.2_v2.6.3.zip"

# --- Instances -------------------------------------------------------------
# One systemd unit each. Run one at a time (unique ports let them co-reside if
# you ever want to). `main` is the Tectonic+Terralith "vanilla-plus forever
# world" and is the only one enabled by default.
minecraft_instances:
  - name: main
    enabled: true
    port: 25565
    rcon_port: 25575
    xms: "2G"
    xmx: "6G"
    motd: "Vingilot Minecraft - eregion (main)"
    mods: "{{ _mods_core + [_mod_tectonic, _mod_lithostitched] }}"
    datapacks: "{{ [_datapack_terralith] }}"

  - name: vanilla
    enabled: false
    port: 25566
    rcon_port: 25576
    xms: "1G"
    xmx: "4G"
    motd: "Vingilot Minecraft - eregion (vanilla)"
    # Stock worldgen + Distant Horizons + the perf set; no Tectonic/Terralith.
    mods: "{{ _mods_core }}"

  # A third world (e.g. creative/build server) drops in the same way — copy the
  # vanilla block, give it a unique name/port/rcon_port, and set enabled when
  # you want it. Per-world gamemode/other server.properties tweaks that aren't
  # in the pinned key set can be set in-game or added to the playbook's key list.
  # - name: creative
  #   enabled: false
  #   port: 25567
  #   rcon_port: 25577
  #   xms: "1G"
  #   xmx: "4G"
  #   motd: "Vingilot Minecraft - eregion (creative)"
  #   mods: "{{ _mods_core }}"
