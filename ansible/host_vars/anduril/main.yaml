---
# Host vars for anduril — CT 117, amdgpu-sharing gaming LXC (Steam Big Picture
# via KWin). See terraform/proxmox/descriptions/anduril.md and
# playbooks/setup-anduril-session.yaml.
#
# The VM-era pins are gone: no Sunshine .deb pin (Steam, not Sunshine, drives
# this now), no MangoHud NVIDIA-NVML source build, no kernel/NVIDIA holds (an
# LXC shares the host kernel — there's no in-guest kernel/driver to pin).

# anduril gets unattended security upgrades like the rest of debian_guests.
# Nothing held back: the session stack (kwin/mesa/steam) is fine to patch, and
# there's no kernel/driver in the container to protect.
unattended_upgrade_blacklist: []
