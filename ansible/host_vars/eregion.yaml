---
# PaperMC server pinning. Bump these to upgrade; re-run install-paper-mc.yaml;
# the handler restarts the service via mcrcon (clean save+stop).
# See runbooks/paper-upgrade.md for the full procedure.
#
# Check https://api.papermc.io/v2/projects/paper for available versions, and
# https://api.papermc.io/v2/projects/paper/versions/<ver> for build numbers.
paper_mc_version: "1.21.11"
paper_build: 69

# JVM heap. Set Xms == Xmx (Aikar's recommendation: eliminates heap-resize
# pauses that read as TPS drops to players). Sized to ~75% of LXC RAM,
# leaving ~1 GiB for OS + JVM non-heap (metaspace, code cache, direct
# buffers).
paper_heap: "3G"

# Aikar's flags — well-tested G1GC tuning for Paper's allocation patterns.
# Source: https://docs.papermc.io/paper/aikars-flags. The `using.aikars.flags`
# marker just lets monitoring tools detect the tuning is in place.
paper_aikar_flags: >-
  -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200
  -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch
  -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8M
  -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4
  -XX:InitiatingHeapOccupancyPercent=15 -XX:G1MixedGCLiveThresholdPercent=90
  -XX:G1RSetUpdatingPauseTimePercent=5 -XX:SurvivorRatio=32
  -XX:+PerfDisableSharedMem -XX:MaxTenuringThreshold=1
  -Dusing.aikars.flags=https://mcflags.emc.gs -Daikars.new.flags=true

# RCON for `mcrcon` from thorondor. Bound to 127.0.0.1 by Paper's default
# `rcon.bind` so it's not exposed off-host — that's why the plaintext value
# here is acceptable in v1. Reach it via `ssh eregion -- mcrcon -H 127.0.0.1 …`
# or an SSH tunnel. Move to SOPS once the homelab settles on a secrets
# convention for ansible vars generally.
paper_rcon_password: "CHANGE-ME-LATER-eregion-rcon"
paper_rcon_port: 25575

# server.properties overrides — Paper auto-generates everything else.
paper_motd: "Vingilot Minecraft - eregion"
paper_max_players: 10
paper_view_distance: 10
paper_difficulty: "normal"
