---
all:
  children:
    # Every Linux host in the homelab is reached as `pseudo` with NOPASSWD
    # sudo. Set up via ansible/playbooks/setup-pseudo-user.yaml.
    sudo_hosts:
      vars:
        ansible_user: pseudo
        ansible_become: true
        ansible_become_method: sudo
      hosts:
        earendil: {}
        tirion: {}
        nfs: {}
        smb: {}
        aglarond: {}
        gondor: {}
        erebor: {}
        samwise: {}
        eregion: {}
        # anduril is now CT 117 — the amdgpu-sharing gaming LXC (Steam Big
        # Picture via KWin; replatformed from a GPU-passthrough VM 2026-06).
        # Always-on (boots to Steam via anduril-session.service). Host-side prep
        # is in site-earendil.yaml (setup-anduril-lxc.yaml); the in-guest session
        # is setup-anduril-session.yaml. See descriptions/anduril.md.
        anduril: {}
    proxmox_hosts:
      hosts:
        earendil: {}
    # Hosts with real (non-virtual) hardware — physical disks for SMART,
    # hwmon-relevant sensors, etc. Distinct from `proxmox_hosts` because a
    # future Pi would be physical without being a Proxmox node.
    physical_hosts:
      hosts:
        earendil: {}
        samwise: {}
    alloy:
      hosts:
        earendil: {}
        tirion: {}
        nfs: {}
        smb: {}
        aglarond: {}
        gondor: {}
        erebor: {}
        samwise: {}
        eregion: {}
        anduril: {}
    # Debian-family hosts that should receive automated security updates.
    # Excludes earendil (Proxmox host — kernel upgrades need manual care).
    # anduril (gaming LXC) is included with no holds — it shares the host kernel,
    # so there's no in-guest kernel/driver to protect (host_vars/anduril sets an
    # empty unattended_upgrade_blacklist).
    debian_guests:
      hosts:
        gondor: {}
        erebor: {}
        nfs: {}
        smb: {}
        aglarond: {}
        tirion: {}
        samwise: {}
        eregion: {}
        anduril: {}
    # Hosts that join gondor's k3s cluster as workers via the
    # install-k3s-agent.yaml playbook. gondor itself is the single-node
    # server and is intentionally NOT in this group.
    k3s_workers:
      hosts:
        samwise: {}
