---
all:
  children:
    # Every Linux host in the homelab is reached as `pseudo` with NOPASSWD
    # sudo. Set up via ansible/playbooks/setup-pseudo-user.yaml.
    sudo_hosts:
      vars:
        ansible_user: pseudo
        ansible_become: true
        ansible_become_method: sudo
      hosts:
        earendil: {}
        tirion: {}
        nfs: {}
        smb: {}
        aglarond: {}
        gondor: {}
        erebor: {}
        samwise: {}
        eregion: {}
        # anduril is a Kubuntu 26.04 gaming VM (replatformed from Bazzite,
        # 2026-05). Off most of the time, so fleet plays should treat it as
        # opportunistically reachable — an `unreachable` recap line when it's
        # powered down is expected, not a failure to chase. The `pseudo` user
        # is created at OS-install time with the operator's SSH key.
        anduril: {}
    proxmox_hosts:
      hosts:
        earendil: {}
    # Hosts with real (non-virtual) hardware — physical disks for SMART,
    # hwmon-relevant sensors, etc. Distinct from `proxmox_hosts` because a
    # future Pi would be physical without being a Proxmox node.
    physical_hosts:
      hosts:
        earendil: {}
        samwise: {}
    alloy:
      hosts:
        earendil: {}
        tirion: {}
        nfs: {}
        smb: {}
        aglarond: {}
        gondor: {}
        erebor: {}
        samwise: {}
        eregion: {}
        anduril: {}
    # Debian-family hosts that should receive automated security updates.
    # Excludes earendil (Proxmox host — kernel upgrades need manual care).
    # anduril (Kubuntu gaming VM) is included but holds back kernel/NVIDIA/
    # Sunshine from unattended upgrades via host_vars/anduril (those families
    # can break GPU passthrough / cold-start); see unattended_upgrade_blacklist.
    debian_guests:
      hosts:
        gondor: {}
        erebor: {}
        nfs: {}
        smb: {}
        aglarond: {}
        tirion: {}
        samwise: {}
        eregion: {}
        anduril: {}
    # Hosts that join gondor's k3s cluster as workers via the
    # install-k3s-agent.yaml playbook. gondor itself is the single-node
    # server and is intentionally NOT in this group.
    k3s_workers:
      hosts:
        samwise: {}
