---
all:
  children:
    # Every Linux host in the homelab is reached as `pseudo` with NOPASSWD
    # sudo. Set up via ansible/playbooks/setup-pseudo-user.yaml.
    sudo_hosts:
      vars:
        ansible_user: pseudo
        ansible_become: true
        ansible_become_method: sudo
      hosts:
        earendil: {}
        tirion: {}
        nfs: {}
        smb: {}
        aglarond: {}
        gondor: {}
        erebor: {}
    bazzite_hosts:
      # anduril is a Bazzite (Fedora-based atomic) gaming VM, off most of the
      # time. Plays should treat it as opportunistically reachable. SSH is
      # configured externally via ~/.ssh/config; if/when ansible runs against
      # it we'll likely need ansible_become details — adjust as needed.
      hosts:
        anduril:
          ansible_become: true
          ansible_become_method: sudo
    proxmox_hosts:
      hosts:
        earendil: {}
    # Hosts with real (non-virtual) hardware — physical disks for SMART,
    # hwmon-relevant sensors, etc. Distinct from `proxmox_hosts` because a
    # future Pi would be physical without being a Proxmox node.
    physical_hosts:
      hosts:
        earendil: {}
    alloy:
      hosts:
        earendil: {}
        tirion: {}
        nfs: {}
        smb: {}
        aglarond: {}
        gondor: {}
        erebor: {}
    # Debian-family hosts that should receive automated security updates.
    # Excludes earendil (Proxmox host — kernel upgrades need manual care)
    # and anduril (Bazzite/Fedora atomic — uses rpm-ostree).
    debian_guests:
      hosts:
        gondor: {}
        erebor: {}
        nfs: {}
        smb: {}
        aglarond: {}
        tirion: {}
