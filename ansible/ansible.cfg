[defaults]
inventory = inventory.yaml
host_key_checking = false
result_format = yaml
retry_files_enabled = false
inventory_enabled_plugins = yaml,ini
interpreter_python = /usr/bin/python3
# Enable the community.sops vars plugin so `*.sops.yaml` files in
# group_vars/ and host_vars/ are auto-decrypted at runtime.
# `host_group_vars` is the built-in plugin we still need for plain vars.
vars_plugins_enabled = host_group_vars,community.sops.sops

[ssh_connection]
pipelining = true
ssh_args = -o ControlMaster=auto -o ControlPersist=60s