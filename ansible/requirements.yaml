---
# Install with:  ansible-galaxy collection install -r requirements.yaml
collections:
  # Provides the sops vars plugin, which transparently decrypts any
  # `*.sops.yaml` file under group_vars/ or host_vars/ at playbook time.
  # Requires the `sops` binary on the controller (already in use for kubernetes/).
  - name: community.sops

  # Provides the `zfs` module (used by setup-k3s-pv-storage.yaml).
  # Already comes as a transitive dependency of community.sops, but we
  # depend on it directly so the requirement is documented.
  - name: community.general

  # Provides the `authorized_key` (used by setup-pseudo-user.yaml) and
  # `sysctl` (used by setup-k3s-sysctls.yaml) modules. Also already a
  # transitive dep of the others.
  - name: ansible.posix
